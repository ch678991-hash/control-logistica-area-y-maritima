<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.C.C.A.M. Elite - Control Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --warning: #facc15; --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .logo-container { text-align: center; margin-bottom: 10px; cursor: pointer; }
        .logo-placeholder { width: 90px; height: 90px; border: 2px dashed var(--accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; background: #1e293b; }
        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .header-app { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .header-app h1 { font-size: 1rem; color: var(--accent); margin: 0; text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; position: relative; }
        .stat-card h4 { font-size: 0.6rem; color: #94a3b8; margin: 0; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: 800; }
        .stat-badge { position: absolute; top: 5px; right: 5px; font-size: 0.5rem; background: #334155; padding: 2px 5px; border-radius: 4px; color: var(--accent); }

        /* Alerta de Autocompletado */
        .auto-alert { background: #064e3b; color: #a7f3d0; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-size: 0.7rem; display: none; border-left: 4px solid var(--success); }

        .tabs { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; color: #94a3b8; background: #1e293b; font-size: 0.75rem; }
        .tab.active { background: white; color: #0f172a; }

        .main-card { background: white; color: #1e293b; padding: 18px; border-radius: 0 10px 10px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 650px) { .form-grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-weight: 700; font-size: 0.65rem; margin-bottom: 4px; color: #475569; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; }
        
        .camera-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; margin-top: 5px; }
        .hidden { display: none; }
        #video, #photoPreview { width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid #cbd5e1; }

        .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-save { background: #0f172a; color: white; }
        .btn-download { background: var(--success); color: white; display: none; }
        .btn-cam-toggle { background: #6366f1; color: white; margin-bottom: 5px; }

        .history-section { margin-top: 25px; background: var(--card); border-radius: 10px; padding: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        th { text-align: left; padding: 12px; color: #94a3b8; font-size: 0.7rem; border-bottom: 1px solid #334155; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 0.8rem; }
        .img-table { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #334155; }

        .action-btn { border: none; padding: 8px; border-radius: 6px; cursor: pointer; color: white; margin-right: 4px; }
        .btn-del { background: var(--danger); }
        .btn-pdf { background: #3b82f6; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" onclick="document.getElementById('logoInput').click()">
        <div class="logo-placeholder" id="logoDisplay"><span>LOGOTIPO</span></div>
        <input type="file" id="logoInput" hidden accept="image/*" onchange="loadLogo(event)">
    </div>

    <div class="header-app"><h1>SISTEMA DE CONTROL DE CARGA AÉREA Y MARÍTIMA</h1></div>

    <div class="dashboard">
        <div class="stat-card">
            <span class="stat-badge" id="badgeModo">MAR</span>
            <h4>REGISTROS</h4>
            <p id="cTotal" style="color:var(--accent)">0</p>
        </div>
        <div id="incidenciaCard" class="stat-card">
            <h4>INCIDENCIAS</h4>
            <p id="cInc" style="color:var(--danger)">0</p>
        </div>
    </div>

    <div id="autoAlert" class="auto-alert"></div>

    <div class="tabs">
        <button id="tabM" class="tab active" onclick="cambiarModo('Marítimo')">🚢 MARÍTIMO</button>
        <button id="tabA" class="tab" onclick="cambiarModo('Aéreo')">✈️ AÉREO</button>
    </div>

    <div class="main-card">
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            
            <div><label id="labelId">N° Contenedor / Guía</label><input type="text" id="idPrincipal"></div>
            <div><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"></div>
            <div><label id="labelBultos">Seguridad (Precinto/Bultos)</label><input type="text" id="bultos"></div>
            <div><label>Inspector Actuante</label><input type="text" id="encargado"></div>
            <div><label>Encargado Almacén</label><input type="text" id="almacenista"></div>
            <div><label style="color:#d97706">Funcionario SENIAT</label><input type="text" id="seniat" style="background:#fffbeb"></div>
            
            <div><label>Nombre del Cliente</label><input type="text" id="cliente" oninput="intelFill()"></div>
            <div><label>Cédula / RIF Cliente</label><input type="text" id="cedulaCliente"></div>
            <div class="full"><label>Empresa del Cliente</label><input type="text" id="empresaCliente" oninput="intelFill()"></div>

            <div class="full"><label>Contenido Declarado</label><input type="text" id="contenido"></div>
            <div class="full"><label style="color:#be123c">⚠️ Hallazgos No Declarados</label><textarea id="noDeclarada" rows="2" style="background:#fff1f2"></textarea></div>
            
            <div>
                <label>Condición Física</label>
                <select id="estado">
                    <option value="Excelente">Excelente ✅</option>
                    <option value="Bueno">Bueno</option>
                    <option value="Dañado">Dañado ⚠️</option>
                    <option value="Mojado">Mojado 💧</option>
                    <option value="Sello Violado">Sello Violado 🚫</option>
                </select>
            </div>

            <div class="full">
                <button type="button" class="btn btn-cam-toggle" id="toggleCamBtn" onclick="mostrarSeccionCamara()">📸 ¿DESEA INCLUIR FOTO?</button>
                <div id="seccionCamara" class="camera-box hidden">
                    <button class="btn" style="background:#10b981; color:white; padding:10px;" onclick="initCamera()">ENCENDER CÁMARA</button>
                    <video id="video" autoplay playsinline class="hidden"></video>
                    <button id="snap" class="btn hidden" style="background:var(--danger); color:white; margin-top:10px" onclick="takePhoto()">CAPTURAR</button>
                    <img id="photoPreview" class="hidden">
                    <canvas id="canvas" class="hidden"></canvas>
                    <button class="btn" style="background:#64748b; color:white; margin-top:10px; padding:8px" onclick="cancelarFoto()">CANCELAR</button>
                </div>
            </div>

            <div class="full"><label>Observaciones Finales</label><textarea id="obs" rows="2"></textarea></div>
        </div>

        <div class="actions">
            <button id="btnGuardar" class="btn btn-save" onclick="registrar()">REGISTRAR DATOS</button>
            <button id="btnDescargar" class="btn btn-download" onclick="descargarActaManual()">⬇️ DESCARGAR ACTA PDF</button>
            <button class="btn" style="background:#10b981; color:white" onclick="exportarExcel()">REPORTE EXCEL GENERAL</button>
        </div>
    </div>

    <div class="history-section">
        <div class="search-box"><input type="text" id="buscador" onkeyup="actualizarUI()" placeholder="🔍 BUSCAR EN HISTORIAL..."></div>
        <table id="tablaDatos">
            <thead>
                <tr>
                    <th>TIPO</th><th>ID CARGA</th><th>FECHA</th><th>CLIENTE</th><th>CÉDULA</th><th>EMPRESA</th><th>ESTADO</th><th>INSPECTOR</th><th>SENIAT</th><th>ALMACÉN</th><th>FOTO</th><th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sccam_final_v30')) || [];
    let appLogo = localStorage.getItem('srca_logo') || '';
    let currentPDFItem = null;
    let modoActual = 'Marítimo';
    let stream;

    if(appLogo) document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`;

    function loadLogo(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { appLogo = ev.target.result; localStorage.setItem('srca_logo', appLogo); document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`; };
        reader.readAsDataURL(e.target.files[0]);
    }

    // LÓGICA DE AUTO-COMPLETADO INTELIGENTE
    function intelFill() {
        const cNom = document.getElementById('cliente').value.trim();
        const eNom = document.getElementById('empresaCliente').value.trim();
        const alertBox = document.getElementById('autoAlert');

        if(cNom.length < 3 && eNom.length < 3) {
            alertBox.style.display = 'none';
            return;
        }

        // Buscamos un registro previo exacto
        const match = db.find(item => 
            (cNom && item.cliente.toLowerCase() === cNom.toLowerCase()) || 
            (eNom && item.empresa.toLowerCase() === eNom.toLowerCase())
        );

        if(match) {
            // Auto-rellenamos los datos encontrados
            document.getElementById('cedulaCliente').value = match.cedula;
            document.getElementById('empresaCliente').value = match.empresa;
            document.getElementById('cliente').value = match.cliente;

            alertBox.innerHTML = `<strong>✨ Auto-completado:</strong> Se han recuperado los datos de <strong>${match.cliente}</strong> desde el historial.`;
            alertBox.style.display = 'block';
        } else {
            alertBox.style.display = 'none';
        }
    }

    function mostrarSeccionCamara() { document.getElementById('seccionCamara').classList.remove('hidden'); document.getElementById('toggleCamBtn').classList.add('hidden'); }
    function cancelarFoto() { if(stream) stream.getTracks().forEach(t => t.stop()); document.getElementById('seccionCamara').classList.add('hidden'); document.getElementById('toggleCamBtn').classList.remove('hidden'); document.getElementById('photoPreview').src = ''; document.getElementById('photoPreview').classList.add('hidden'); document.getElementById('video').classList.add('hidden'); document.getElementById('snap').classList.add('hidden'); }

    async function initCamera() { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); const v = document.getElementById('video'); v.srcObject = stream; v.classList.remove('hidden'); document.getElementById('snap').classList.remove('hidden'); }
    function takePhoto() { const c = document.getElementById('canvas'); const v = document.getElementById('video'); c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0); const data = c.toDataURL('image/jpeg', 0.6); const prev = document.getElementById('photoPreview'); prev.src = data; prev.classList.remove('hidden'); if(stream) stream.getTracks().forEach(t => t.stop()); v.classList.add('hidden'); document.getElementById('snap').classList.add('hidden'); }

    function cambiarModo(m) {
        modoActual = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(m === 'Marítimo' ? 'tabM' : 'tabA').classList.add('active');
        document.getElementById('labelId').innerText = m === 'Marítimo' ? "N° Contenedor" : "N° Guía";
        document.getElementById('labelBultos').innerText = m === 'Marítimo' ? "N° Precinto" : "Bultos Reconocidos";
        document.getElementById('badgeModo').innerText = m === 'Marítimo' ? "MAR" : "AIRE";
        actualizarUI();
    }

    function registrar() {
        const item = {
            id: document.getElementById('idPrincipal').value,
            tipo: modoActual,
            fecha: document.getElementById('fechaHora').value.replace('T', ' '),
            bultos: document.getElementById('bultos').value,
            encargado: document.getElementById('encargado').value,
            almacenista: document.getElementById('almacenista').value,
            seniat: document.getElementById('seniat').value,
            cliente: document.getElementById('cliente').value,
            cedula: document.getElementById('cedulaCliente').value,
            empresa: document.getElementById('empresaCliente').value,
            contenido: document.getElementById('contenido').value,
            noDeclarado: document.getElementById('noDeclarada').value,
            estado: document.getElementById('estado').value,
            obs: document.getElementById('obs').value,
            foto: document.getElementById('photoPreview').src || ''
        };
        if(!item.id || !item.cliente) return alert("Complete los campos.");
        db.push(item);
        localStorage.setItem('sccam_final_v30', JSON.stringify(db));
        currentPDFItem = item;
        document.getElementById('btnDescargar').style.display = 'block';
        document.getElementById('autoAlert').style.display = 'none';
        actualizarUI();
    }

    function descargarActaManual() { if(currentPDFItem) { generarPDF(currentPDFItem); document.getElementById('btnDescargar').style.display = 'none'; limpiarForm(); } }

    function generarPDF(item) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        if(appLogo) doc.addImage(appLogo, 'PNG', 15, 10, 20, 20);
        doc.setFontSize(14); doc.text("ACTA DE RECONOCIMIENTO FÍSICO", 40, 20);
        doc.line(15, 32, 195, 32);
        let y = 40; doc.setFontSize(10);
        const fields = [["ID:", item.id], ["TIPO:", item.tipo], ["CLIENTE:", item.cliente], ["CÉDULA:", item.cedula], ["EMPRESA:", item.empresa], ["ESTADO:", item.estado], ["INSPECTOR:", item.encargado], ["ALMACÉN:", item.almacenista]];
        fields.forEach(f => { doc.text(`${f[0]} ${f[1]}`, 15, y); y += 7; });
        if(item.foto) doc.addImage(item.foto, 'JPEG', 15, y+5, 60, 45);
        doc.save(`ACTA_${item.id}.pdf`);
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('cuerpoTabla');
        const filtro = document.getElementById('buscador').value.toLowerCase();
        cuerpo.innerHTML = '';
        const filtrados = db.filter(item => item.tipo === modoActual);
        document.getElementById('cTotal').innerText = filtrados.length;
        document.getElementById('cInc').innerText = filtrados.filter(i => i.estado !== 'Excelente' && i.estado !== 'Bueno').length;

        filtrados.slice().reverse().forEach((item) => {
            const index = db.indexOf(item);
            if(`${item.id} ${item.cliente} ${item.empresa}`.toLowerCase().includes(filtro)) {
                cuerpo.innerHTML += `<tr>
                    <td><small>${item.tipo}</small></td><td><b>${item.id}</b></td><td><small>${item.fecha}</small></td>
                    <td>${item.cliente}</td><td>${item.cedula}</td><td>${item.empresa}</td>
                    <td style="color:${item.estado === 'Excelente' || item.estado === 'Bueno' ? 'var(--success)' : 'var(--danger)'}">${item.estado}</td>
                    <td>${item.encargado}</td><td>${item.seniat}</td><td>${item.almacenista}</td>
                    <td>${item.foto ? `<img src="${item.foto}" class="img-table">` : 'N/A'}</td>
                    <td><button class="action-btn btn-pdf" onclick="generarPDF(db[${index}])">📄</button><button class="action-btn btn-del" onclick="eliminar(${index})">🗑️</button></td>
                </tr>`;
            }
        });
    }

    function eliminar(idx) { if(confirm("¿Eliminar?")) { db.splice(idx, 1); localStorage.setItem('sccam_final_v30', JSON.stringify(db)); actualizarUI(); } }
    function limpiarForm() { ['idPrincipal', 'fechaHora', 'bultos', 'encargado', 'almacenista', 'seniat', 'cliente', 'cedulaCliente', 'empresaCliente', 'contenido', 'noDeclarada', 'obs'].forEach(id => document.getElementById(id).value = ''); cancelarFoto(); }
    function exportarExcel() { const ws = XLSX.utils.json_to_sheet(db.map(({foto, ...r}) => r)); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "Reporte_SCCAM.xlsx"); }
    actualizarUI();
</script>
</body>
</html>
