<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.C.C.A.M. Ultra - Optimizado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --warning: #facc15; --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header-app { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .header-app h1 { font-size: 0.9rem; color: var(--accent); margin: 0; text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .stat-card p { margin: 5px 0 0; font-size: 1.3rem; font-weight: 800; }

        #intelTag { display: none; background: #064e3b; color: #a7f3d0; padding: 8px; border-radius: 8px; font-size: 0.7rem; margin-bottom: 10px; text-align: center; border: 1px solid var(--success); }

        .tabs { display: flex; gap: 4px; }
        .tab { flex: 1; padding: 14px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; color: #94a3b8; background: #1e293b; font-size: 0.7rem; }
        .tab.active { background: white; color: #0f172a; }

        .main-card { background: white; color: #1e293b; padding: 15px; border-radius: 0 10px 10px 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-weight: 800; font-size: 0.6rem; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; }
        
        .camera-box { background: #f1f5f9; padding: 10px; border-radius: 12px; border: 2px solid #cbd5e1; margin-top: 10px; }
        .hidden { display: none !important; }
        #video, #photoPreview { width: 100%; border-radius: 10px; margin-top: 5px; background: black; max-height: 300px; object-fit: contain; }

        .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-save { background: #0f172a; color: white; }
        .btn-download { background: var(--success); color: white; display: none; }
        .btn-cam-toggle { background: #4f46e5; color: white; }

        .history-section { margin-top: 25px; background: var(--card); border-radius: 12px; padding: 10px; overflow-x: auto; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 10px; color: #64748b; font-size: 0.65rem; border-bottom: 2px solid #334155; }
        td { padding: 10px; border-bottom: 1px solid #334155; font-size: 0.75rem; color: #cbd5e1; }
        .img-table { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }

        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-app"><h1>S.C.C.A.M. v5.5 (ULTRA-FAST)</h1></div>

    <div class="dashboard">
        <div class="stat-card"><h4>REGISTROS</h4><p id="cTotal" style="color:var(--accent)">0</p></div>
        <div class="stat-card"><h4>INCIDENCIAS</h4><p id="cInc" style="color:var(--danger)">0</p></div>
    </div>

    <div id="intelTag">✨ Datos recuperados automáticamente</div>

    <div class="tabs">
        <button id="tabM" class="tab active" onclick="cambiarModo('Marítimo')">🚢 MAR</button>
        <button id="tabA" class="tab" onclick="cambiarModo('Aéreo')">✈️ AIRE</button>
    </div>

    <div class="main-card">
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            <div><label id="labelId">N° Contenedor</label><input type="text" id="idPrincipal"></div>
            <div><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"></div>
            <div><label id="labelSeguridad">N° Precinto</label><input type="text" id="bultos"></div>
            
            <div><label>Inspector</label><input type="text" id="encargado" list="listInspectores"></div>
            <div><label>Almacén</label><input type="text" id="almacenista" list="listAlmacenistas"></div>
            <div><label>SENIAT</label><input type="text" id="seniat" list="listSeniat"></div>
            
            <div><label>Cliente</label><input type="text" id="cliente" list="listClientes" oninput="detectarDatos(this.value)"></div>
            <div><label>Cédula/RIF</label><input type="text" id="cedulaCliente"></div>
            <div class="full"><label>Empresa</label><input type="text" id="empresaCliente" list="listEmpresas"></div>

            <div class="full"><label>Contenido</label><input type="text" id="contenido"></div>
            <div>
                <label>Estado</label>
                <select id="estado">
                    <option value="Excelente">Excelente ✅</option>
                    <option value="Bueno">Bueno</option>
                    <option value="Dañado">Dañado ⚠️</option>
                    <option value="Mojado">Mojado 💧</option>
                </select>
            </div>

            <div class="full">
                <button type="button" class="btn btn-cam-toggle" id="toggleCamBtn" onclick="toggleCamara(true)">📸 INCLUIR FOTO</button>
                <div id="seccionCamara" class="camera-box hidden">
                    <video id="video" autoplay playsinline></video>
                    <button id="snap" class="btn" style="background:var(--danger); color:white; margin-top:5px" onclick="takePhoto()">CAPTURAR</button>
                    <img id="photoPreview" class="hidden">
                    <canvas id="canvas" class="hidden"></canvas>
                    <button class="btn" style="background:#64748b; color:white; margin-top:5px" onclick="toggleCamara(false)">CANCELAR</button>
                </div>
            </div>
            <div class="full"><label>Observaciones</label><textarea id="obs" rows="2"></textarea></div>
        </div>

        <div class="actions">
            <button id="btnGuardar" class="btn btn-save" onclick="registrar()">REGISTRAR</button>
            <button id="btnDescargar" class="btn btn-download" onclick="descargarActaManual()">⬇️ DESCARGAR PDF</button>
        </div>
    </div>

    <datalist id="listInspectores"></datalist><datalist id="listAlmacenistas"></datalist>
    <datalist id="listSeniat"></datalist><datalist id="listClientes"></datalist><datalist id="listEmpresas"></datalist>

    <div class="history-section">
        <input type="text" id="buscador" onkeyup="actualizarUI()" placeholder="🔍 Buscar..." style="width:100%; padding:10px; border-radius:8px; background:#0f172a; color:white; border:1px solid #334155; margin-bottom:10px;">
        <table id="tablaDatos">
            <thead><tr><th>ID</th><th>CLIENTE</th><th>EMPRESA</th><th>ESTADO</th><th>FOTO</th><th>PDF</th></tr></thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sccam_v55')) || [];
    let currentPDFItem = null;
    let modoActual = 'Marítimo';
    let stream = null;

    function detectarDatos(nombre) {
        const match = db.find(i => i.cliente.toLowerCase() === nombre.toLowerCase());
        if(match) {
            document.getElementById('cedulaCliente').value = match.cedula;
            document.getElementById('empresaCliente').value = match.empresa;
            const tag = document.getElementById('intelTag');
            tag.style.display = 'block';
            setTimeout(() => tag.style.display = 'none', 2000);
        }
    }

    function toggleCamara(show) {
        const box = document.getElementById('seccionCamara');
        const btn = document.getElementById('toggleCamBtn');
        if(show) {
            box.classList.remove('hidden');
            btn.classList.add('hidden');
            initCamera();
        } else {
            box.classList.add('hidden');
            btn.classList.remove('hidden');
            stopCamera();
        }
    }

    async function initCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640 } });
            document.getElementById('video').srcObject = stream;
        } catch(e) { alert("Error cámara"); }
    }

    function stopCamera() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
    }

    function takePhoto() {
        const c = document.getElementById('canvas');
        const v = document.getElementById('video');
        c.width = 400; c.height = 300; // Resolución fija optimizada
        c.getContext('2d').drawImage(v, 0, 0, 400, 300);
        const data = c.toDataURL('image/jpeg', 0.4); // COMPRESIÓN AL 40%
        document.getElementById('photoPreview').src = data;
        document.getElementById('photoPreview').classList.remove('hidden');
        v.classList.add('hidden');
        document.getElementById('snap').classList.add('hidden');
        stopCamera();
    }

    function cambiarModo(m) {
        modoActual = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(m === 'Marítimo' ? 'tabM' : 'tabA').classList.add('active');
        document.getElementById('labelId').innerText = m === 'Marítimo' ? "N° Contenedor" : "N° Guía";
        document.getElementById('labelSeguridad').innerText = m === 'Marítimo' ? "N° Precinto" : "Bultos";
        actualizarUI();
    }

    function registrar() {
        const item = {
            id: document.getElementById('idPrincipal').value,
            tipo: modoActual,
            fecha: new Date().toLocaleString(),
            bultos: document.getElementById('bultos').value,
            encargado: document.getElementById('encargado').value,
            almacenista: document.getElementById('almacenista').value,
            seniat: document.getElementById('seniat').value,
            cliente: document.getElementById('cliente').value,
            cedula: document.getElementById('cedulaCliente').value,
            empresa: document.getElementById('empresaCliente').value,
            contenido: document.getElementById('contenido').value,
            estado: document.getElementById('estado').value,
            obs: document.getElementById('obs').value,
            foto: document.getElementById('photoPreview').src || ''
        };
        if(!item.id) return alert("ID Requerido");
        db.push(item);
        localStorage.setItem('sccam_v55', JSON.stringify(db));
        currentPDFItem = item;
        document.getElementById('btnDescargar').style.display = 'block';
        actualizarUI();
        actualizarListas();
        alert("Guardado");
    }

    function descargarActaManual() {
        if(!currentPDFItem) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(14); doc.text("ACTA DE RECONOCIMIENTO SCCAM", 20, 20);
        doc.setFontSize(10);
        let y = 35;
        const info = [`ID: ${currentPDFItem.id}`, `Cliente: ${currentPDFItem.cliente}`, `Empresa: ${currentPDFItem.empresa}`, `Estado: ${currentPDFItem.estado}`];
        info.forEach(t => { doc.text(t, 20, y); y += 8; });
        if(currentPDFItem.foto) doc.addImage(currentPDFItem.foto, 'JPEG', 20, y, 60, 45);
        doc.save(`ACTA_${currentPDFItem.id}.pdf`);
        document.getElementById('btnDescargar').style.display = 'none';
        limpiarForm();
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('cuerpoTabla');
        const f = document.getElementById('buscador').value.toLowerCase();
        cuerpo.innerHTML = '';
        const filt = db.filter(i => i.tipo === modoActual);
        document.getElementById('cTotal').innerText = filt.length;
        document.getElementById('cInc').innerText = filt.filter(i => i.estado !== 'Excelente' && i.estado !== 'Bueno').length;

        filt.slice(-10).reverse().forEach((item, i) => { // Solo mostramos los últimos 10 para velocidad
            if(item.id.toLowerCase().includes(f) || item.cliente.toLowerCase().includes(f)) {
                cuerpo.innerHTML += `<tr>
                    <td><b>${item.id}</b></td><td>${item.cliente}</td><td>${item.empresa}</td><td>${item.estado}</td>
                    <td>${item.foto ? `<img src="${item.foto}" class="img-table">` : 'N/A'}</td>
                    <td><button class="btn-del" onclick="eliminar(${db.indexOf(item)})">🗑️</button></td>
                </tr>`;
            }
        });
    }

    function actualizarListas() {
        const sets = { listClientes: 'cliente', listEmpresas: 'empresa', listInspectores: 'encargado' };
        for(let id in sets) {
            const list = document.getElementById(id);
            list.innerHTML = [...new Set(db.map(i => i[sets[id]]))].map(v => `<option value="${v}">`).join('');
        }
    }

    function eliminar(idx) { if(confirm("¿Borrar?")) { db.splice(idx, 1); localStorage.setItem('sccam_v55', JSON.stringify(db)); actualizarUI(); } }
    function limpiarForm() { 
        ['idPrincipal','bultos','encargado','almacenista','seniat','cliente','cedulaCliente','empresaCliente','contenido','obs'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('photoPreview').src = ''; document.getElementById('photoPreview').classList.add('hidden');
        toggleCamara(false);
    }

    actualizarUI();
    actualizarListas();
</script>
</body>
</html>
