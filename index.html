<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.I.C.A.M. Elite - Pro Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --success: #10b981; --border: #334155; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden;}

        /* --- LOGIN STYLES --- */
        #auth-container {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s;
        }
        .auth-card {
            background: var(--card); padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        .auth-card h2 { color: var(--accent); margin-top: 0; }
        .auth-card input { 
            background: #0f172a; border: 1px solid var(--border); color: white;
            margin-bottom: 15px; padding: 15px; width: 100%; border-radius: 10px;
        }
        .btn-auth { background: var(--accent); color: #0f172a; border:none; padding:15px; border-radius:10px; font-weight:bold; width:100%; cursor:pointer; }
        .toggle-auth { color: var(--accent); font-size: 0.8rem; cursor: pointer; margin-top: 15px; display: block; }
        
        /* --- APP STYLES --- */
        #app-content { display: none; }
        
        .logo-container { text-align: center; margin-bottom: 10px; position: relative; }
        .nav-btns { position: absolute; right: 10px; top: 10px; display: flex; gap: 5px; }
        .logout-btn { background: var(--danger); border:none; color:white; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor:pointer;}
        .admin-btn { background: var(--warning); border:none; color:white; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor:pointer; display: none; }
        
        .logo-placeholder { width: 90px; height: 90px; border: 2px dashed var(--accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; background: #1e293b; cursor: pointer; overflow: hidden; }
        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .header-app { text-align: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header-app h1 { font-size: 1.1rem; color: var(--accent); margin: 0; text-transform: uppercase; }

        /* --- SECCIÓN ADMIN --- */
        #admin-panel { background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 2px solid var(--warning); display: none; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }

        /* Resto de estilos originales se mantienen */
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-card h4 { font-size: 0.6rem; color: #94a3b8; margin: 0; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: 800; }

        .tabs { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; color: #94a3b8; background: #1e293b; font-size: 0.75rem; transition: 0.2s; }
        .tab.active { background: white; color: #0f172a; transform: translateY(-2px); }

        .main-card { background: white; color: #1e293b; padding: 20px; border-radius: 0 10px 10px 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-weight: 800; font-size: 0.7rem; margin-bottom: 5px; color: #334155; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
        
        .camera-box { background: #f1f5f9; padding: 15px; border-radius: 12px; border: 2px solid #cbd5e1; margin-top: 10px; text-align: center; }
        .hidden { display: none !important; }
        #video, #photoPreview { width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid #94a3b8; max-width: 320px; }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: #0f172a; color: white; border: 2px solid var(--accent); }
        .btn-download { background: var(--success); color: white; display: none; }

        .history-section { background: var(--card); border-radius: 10px; padding: 15px; margin-top: 25px; }
        .search-box input { background: #0f172a; color: white; border: 1px solid var(--border); padding: 14px; width: 100%; border-radius: 10px; margin-bottom: 15px; }
        
        .table-container { overflow-x: auto; width: 100%; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 2200px; } 
        th { text-align: left; padding: 14px; color: var(--accent); font-size: 0.75rem; border-bottom: 2px solid var(--border); text-transform: uppercase; background: #1e293b; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: white; vertical-align: middle; }
        .img-table { width: 65px; height: 65px; border-radius: 6px; object-fit: cover; border: 1px solid var(--accent); }
        
        .action-btns { display: flex; gap: 5px; flex-direction: column; }
        .btn-mini { padding: 8px; border-radius: 6px; border: none; color: white; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="auth-container">
        <div class="auth-card">
            <h2 id="auth-title">S.I.C.A.M. LOGIN</h2>
            <div id="login-fields">
                <input type="text" id="user-input" placeholder="Usuario">
                <input type="password" id="pass-input" placeholder="Contraseña">
                <button class="btn-auth" onclick="manejarAuth()">INGRESAR</button>
                <span class="toggle-auth" onclick="toggleAuthMode(true)">¿No tienes cuenta? Regístrate</span>
            </div>
            <div id="register-fields" class="hidden">
                <input type="text" id="reg-user" placeholder="Nuevo Usuario">
                <input type="password" id="reg-pass" placeholder="Nueva Contraseña">
                <input type="password" id="reg-master" placeholder="Código Maestro (Autorización)">
                <button class="btn-auth" style="background:var(--success)" onclick="registrarUsuario()">CREAR CUENTA</button>
                <span class="toggle-auth" onclick="toggleAuthMode(false)">Volver al Login</span>
            </div>
        </div>
    </div>

    <!-- CONTENIDO DE LA APP -->
    <div id="app-content">
        <div class="logo-container">
            <div class="nav-btns">
                <button id="admin-toggle-btn" class="admin-btn" onclick="togglePanelAdmin()">⚙️ PANEL ADMIN</button>
                <button class="logout-btn" onclick="cerrarSesion()">SALIR</button>
            </div>
            <div class="logo-placeholder" id="logoDisplay" onclick="document.getElementById('logoInput').click()">
                <span>LOGO</span>
            </div>
            <input type="file" id="logoInput" hidden accept="image/*" onchange="loadLogo(event)">
        </div>

        <!-- PANEL DE SUPER USUARIO (OCULTO POR DEFECTO) -->
        <div id="admin-panel">
            <h3 style="color:var(--warning); margin-top:0">🛠️ ADMINISTRACIÓN DE USUARIOS</h3>
            <div id="user-list">
                <!-- Aquí se cargan los usuarios dinámicamente -->
            </div>
            <button class="btn" style="background:var(--border); margin-top:15px; color:white" onclick="togglePanelAdmin()">CERRAR PANEL</button>
        </div>

        <div class="header-app">
            <h1>SISTEMA DE CONTROL DE CARGA</h1>
            <small id="welcome-user" style="color: var(--accent)"></small>
        </div>

        <!-- Dashboard y Formulario (Sin cambios en funcionalidad) -->
        <div class="dashboard">
            <div class="stat-card"><h4>REGISTROS</h4><p id="cTotal" style="color:var(--accent)">0</p></div>
            <div class="stat-card"><h4>MODO</h4><p id="txtModo" style="color:var(--success)">MARÍTIMO</p></div>
        </div>

        <div class="tabs">
            <button id="tabM" class="tab active" onclick="cambiarModo('Marítimo')">🚢 MARÍTIMO</button>
            <button id="tabA" class="tab" onclick="cambiarModo('Aéreo')">✈️ AÉREO</button>
        </div>

        <div class="main-card">
            <input type="hidden" id="edit_id">
            <div class="form-grid">
                <div><label id="labelId">N° Contenedor / Guía</label><input type="text" id="idPrincipal"></div>
                <div><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"></div>
                <div><label>N° de Precinto</label><input type="text" id="numPrecinto"></div>
                <div><label>Cantidad de Bultos</label><input type="number" id="cantBultos"></div>
                <div class="full"><label>Personas Encargadas / Responsables</label><input type="text" id="encargado"></div>
                
                <div class="full">
                    <label>Cliente (Buscar o escribir)</label>
                    <input type="text" id="cliente" list="clientesList" oninput="autocompletarCliente(this.value)" placeholder="▼ Seleccione o escriba el nombre del cliente">
                    <datalist id="clientesList"></datalist>
                </div>
                
                <div><label>Cédula / ID</label><input type="text" id="cedulaCliente"></div>
                <div class="full"><label>Empresa Solicitante</label><input type="text" id="empresaCliente"></div>
                
                <div><label>Encargado Almacén</label><input type="text" id="almacenista"></div>
                <div><label>Condición Física</label>
                    <select id="estado">
                        <option value="Excelente">Excelente ✅</option>
                        <option value="Bueno">Bueno</option>
                        <option value="Dañado">Dañado ⚠️</option>
                        <option value="Sello Violado">Sello Violado 🚫</option>
                    </select>
                </div>
                <div class="full"><label>Contenido Declarado</label><textarea id="contenido" rows="2"></textarea></div>
                <div class="full"><label style="color:var(--danger)">Hallazgos No Declarados</label><textarea id="noDeclarada" rows="2"></textarea></div>
                <div class="full">
                    <button type="button" class="btn" style="background:#6366f1; color:white;" id="toggleCamBtn" onclick="mostrarSeccionCamara()">📸 CAPTURAR FOTO</button>
                    <div id="seccionCamara" class="camera-box hidden">
                        <video id="video" autoplay playsinline class="hidden"></video>
                        <button class="btn" style="background:var(--success); color:white; margin:10px 0" onclick="initCamera()">ENCENDER CÁMARA</button>
                        <button id="snap" class="btn hidden" style="background:var(--danger); color:white" onclick="takePhoto()">TOMAR FOTO</button>
                        <img id="photoPreview" class="hidden">
                        <canvas id="canvas" class="hidden"></canvas>
                    </div>
                </div>
                <div class="full"><label>Observaciones Finales</label><textarea id="obs" rows="2"></textarea></div>
            </div>

            <div class="actions">
                <button id="btnGuardar" class="btn btn-save" onclick="registrarEnLaNube()">🚀 SUBIR REGISTRO A LA NUBE</button>
                <button id="btnDescargar" class="btn btn-download" onclick="descargarActaManual()">⬇️ GENERAR ACTA PDF</button>
            </div>
        </div>

        <div class="history-section">
            <h3 style="color:var(--accent); font-size: 0.8rem;">HISTORIAL DE REGISTROS</h3>
            <div class="search-box">
                <input type="text" id="buscador" onkeyup="actualizarUI()" placeholder="🔍 Filtrar registros...">
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Acciones</th>
                            <th>ID Carga</th>
                            <th>Fecha</th>
                            <th>Precinto</th>
                            <th>Bultos</th>
                            <th>Responsables</th>
                            <th>Cliente</th>
                            <th>Cédula</th>
                            <th>Empresa</th>
                            <th>Estado</th>
                            <th>Foto</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const SB_URL = "https://bnbecaxqnbuzacdsbvco.supabase.co"; 
    const SB_KEY = "sb_publishable_NYcOsL-Ot5lF9TEDMK8jpg_mXC6fdp7";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let db = []; 
    let modoActual = 'Marítimo';
    let appLogo = localStorage.getItem('srca_logo') || '';
    let currentPDFItem = null;
    let stream;
    let memoriaClientes = JSON.parse(localStorage.getItem('sccam_clientes')) || {};
    
    // --- GESTIÓN DE USUARIOS MEJORADA ---
    const MASTER_CODE = "SICAM2026"; 
    // Los usuarios ahora guardan un objeto {pass, status}
    let usuarios = JSON.parse(localStorage.getItem('sicam_users')) || { "admin": {pass: "1234", status: "activo"} };

    document.addEventListener('DOMContentLoaded', () => {
        verificarSesion();
        if(appLogo) document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`;
    });

    function toggleAuthMode(isRegister) {
        document.getElementById('login-fields').classList.toggle('hidden', isRegister);
        document.getElementById('register-fields').classList.toggle('hidden', !isRegister);
        document.getElementById('auth-title').innerText = isRegister ? "NUEVO USUARIO" : "S.I.C.A.M. LOGIN";
    }

    function manejarAuth() {
        const u = document.getElementById('user-input').value.toLowerCase();
        const p = document.getElementById('pass-input').value;

        if (usuarios[u]) {
            if (usuarios[u].status === "suspendido") return alert("Esta cuenta ha sido suspendida por el Administrador.");
            if (usuarios[u].pass === p) {
                iniciarApp(u);
            } else {
                alert("Contraseña incorrecta");
            }
        } else {
            alert("Usuario no existe");
        }
    }

    function registrarUsuario() {
        const u = document.getElementById('reg-user').value.toLowerCase().trim();
        const p = document.getElementById('reg-pass').value;
        const m = document.getElementById('reg-master').value;

        if(!u || !p) return alert("Completa los campos");
        if(m !== MASTER_CODE) return alert("Código Maestro incorrecto.");
        if(usuarios[u]) return alert("El usuario ya existe.");
        
        usuarios[u] = { pass: p, status: "activo" };
        guardarUsuarios();
        alert("¡Usuario creado!");
        toggleAuthMode(false);
    }

    function iniciarApp(user) {
        localStorage.setItem('sicam_session', user);
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('welcome-user').innerText = `Operador: ${user.toUpperCase()}`;
        
        // Mostrar botón de admin solo si es "admin"
        if(user === "admin") {
            document.getElementById('admin-toggle-btn').style.display = 'block';
            actualizarListaUsuarios();
        }

        cargarDatosDeNube();
        actualizarDatalistClientes();
    }

    // --- FUNCIONES DEL SÚPER USUARIO (ADMIN) ---
    function togglePanelAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function actualizarListaUsuarios() {
        const container = document.getElementById('user-list');
        container.innerHTML = '';
        
        Object.keys(usuarios).forEach(user => {
            const row = document.createElement('div');
            row.className = 'user-row';
            const isSuspended = usuarios[user].status === "suspendido";
            
            row.innerHTML = `
                <div>
                    <b style="color:var(--accent)">${user.toUpperCase()}</b><br>
                    <small style="color:#94a3b8">Pass: ${usuarios[user].pass}</small>
                </div>
                <div>
                    <button onclick="toggleUserStatus('${user}')" style="background:${isSuspended ? 'var(--success)' : 'var(--warning)'}; border:none; padding:5px 8px; border-radius:5px; color:white; cursor:pointer">
                        ${isSuspended ? 'Activar' : 'Suspender'}
                    </button>
                    ${user !== 'admin' ? `
                        <button onclick="eliminarUsuario('${user}')" style="background:var(--danger); border:none; padding:5px 8px; border-radius:5px; color:white; cursor:pointer; margin-left:5px">
                            Borrar
                        </button>
                    ` : ''}
                </div>
            `;
            container.appendChild(row);
        });
    }

    function toggleUserStatus(user) {
        usuarios[user].status = usuarios[user].status === "activo" ? "suspendido" : "activo";
        guardarUsuarios();
        actualizarListaUsuarios();
    }

    function eliminarUsuario(user) {
        if(confirm(`¿Seguro que deseas eliminar al usuario ${user}?`)) {
            delete usuarios[user];
            guardarUsuarios();
            actualizarListaUsuarios();
        }
    }

    function guardarUsuarios() {
        localStorage.setItem('sicam_users', JSON.stringify(usuarios));
    }

    // --- RESTO DE FUNCIONALIDAD DEL SISTEMA ---
    function verificarSesion() {
        const sesion = localStorage.getItem('sicam_session');
        if(sesion && usuarios[sesion] && usuarios[sesion].status === "activo") {
            iniciarApp(sesion);
        } else {
            localStorage.removeItem('sicam_session');
        }
    }

    function cerrarSesion() {
        localStorage.removeItem('sicam_session');
        location.reload();
    }

    async function cargarDatosDeNube() {
        const { data, error } = await _supabase.from('registros_carga').select('*').order('created_at', { ascending: false });
        if (!error) { 
            db = data; 
            actualizarUI(); 
            data.forEach(reg => {
                if(reg.cliente && reg.cedula) {
                    memoriaClientes[reg.cliente] = { cedula: reg.cedula, empresa: reg.empresa };
                }
            });
            localStorage.setItem('sccam_clientes', JSON.stringify(memoriaClientes));
            actualizarDatalistClientes();
        }
    }

    function actualizarDatalistClientes() {
        const list = document.getElementById('clientesList');
        list.innerHTML = '';
        Object.keys(memoriaClientes).sort().forEach(nombre => {
            const option = document.createElement('option');
            option.value = nombre;
            list.appendChild(option);
        });
    }

    function autocompletarCliente(valor) {
        if(memoriaClientes[valor]) {
            document.getElementById('cedulaCliente').value = memoriaClientes[valor].cedula;
            document.getElementById('empresaCliente').value = memoriaClientes[valor].empresa;
        }
    }

    function cambiarModo(m) {
        if(modoActual === m) return; 
        modoActual = m;
        document.getElementById('tabM').classList.toggle('active', m === 'Marítimo');
        document.getElementById('tabA').classList.toggle('active', m === 'Aéreo');
        document.getElementById('txtModo').innerText = m.toUpperCase();
        document.getElementById('labelId').innerText = m === 'Marítimo' ? "N° Contenedor" : "N° Guía / Vuelo";
        actualizarUI();
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('cuerpoTabla');
        const filtro = document.getElementById('buscador').value.toLowerCase();
        const filtrados = db.filter(i => i.tipo === modoActual);
        document.getElementById('cTotal').innerText = filtrados.length;
        
        let html = '';
        filtrados.forEach((i) => {
            if(`${i.id_carga} ${i.cliente} ${i.empresa}`.toLowerCase().includes(filtro)) {
                html += `<tr>
                    <td class="action-btns">
                        <button class="btn-mini" style="background:#3b82f6" onclick='generarPDF(${JSON.stringify(i)})'>PDF</button>
                        <button class="btn-mini" style="background:#f59e0b" onclick='cargarEdicion(${JSON.stringify(i)})'>EDITAR</button>
                        <button class="btn-mini" style="background:#ef4444" onclick="eliminarRegistro(${i.id})">BORRAR</button>
                    </td>
                    <td><b>${i.id_carga}</b></td>
                    <td>${i.fecha ? i.fecha.replace('T', ' ') : '-'}</td>
                    <td style="color:var(--accent)">${i.num_precinto || '-'}</td>
                    <td>${i.cant_bultos || '0'}</td>
                    <td>${i.encargado || '-'}</td>
                    <td>${i.cliente || ''}</td>
                    <td>${i.cedula || ''}</td>
                    <td>${i.empresa || ''}</td>
                    <td>${i.estado}</td>
                    <td>${i.foto ? `<img src="${i.foto}" class="img-table">` : 'N/A'}</td>
                </tr>`;
            }
        });
        cuerpo.innerHTML = html;
    }

    async function registrarEnLaNube() {
        const idVal = document.getElementById('idPrincipal').value;
        const nombreCliente = document.getElementById('cliente').value;
        const editId = document.getElementById('edit_id').value;
        
        if(!idVal || !nombreCliente) return alert("Ingrese ID y Cliente");

        const btn = document.getElementById('btnGuardar');
        btn.innerText = "⏳ PROCESANDO...";
        btn.disabled = true;

        const item = {
            id_carga: idVal, tipo: modoActual, fecha: document.getElementById('fechaHora').value,
            num_precinto: document.getElementById('numPrecinto').value,
            cant_bultos: document.getElementById('cantBultos').value,
            encargado: document.getElementById('encargado').value,
            almacenista: document.getElementById('almacenista').value,
            cliente: nombreCliente,
            empresa: document.getElementById('empresaCliente').value,
            cedula: document.getElementById('cedulaCliente').value,
            contenido: document.getElementById('contenido').value,
            no_declared: document.getElementById('noDeclarada').value,
            estado: document.getElementById('estado').value,
            observaciones: document.getElementById('obs').value,
            foto: document.getElementById('photoPreview').src.startsWith('data:image') ? document.getElementById('photoPreview').src : (editId ? db.find(x => x.id == editId).foto : '')
        };

        let res;
        if(editId) {
            res = await _supabase.from('registros_carga').update(item).eq('id', editId);
        } else {
            res = await _supabase.from('registros_carga').insert([item]);
        }

        if (!res.error) {
            alert("✅ Guardado");
            currentPDFItem = item;
            document.getElementById('btnDescargar').style.display = 'block';
            await cargarDatosDeNube();
            limpiarForm();
        } else {
            alert("Error: " + res.error.message);
        }
        btn.innerText = "🚀 SUBIR REGISTRO A LA NUBE";
        btn.disabled = false;
    }

    function cargarEdicion(item) {
        document.getElementById('edit_id').value = item.id;
        document.getElementById('idPrincipal').value = item.id_carga;
        document.getElementById('fechaHora').value = item.fecha;
        document.getElementById('numPrecinto').value = item.num_precinto;
        document.getElementById('cantBultos').value = item.cant_bultos;
        document.getElementById('encargado').value = item.encargado;
        document.getElementById('cliente').value = item.cliente;
        document.getElementById('cedulaCliente').value = item.cedula;
        document.getElementById('empresaCliente').value = item.empresa;
        document.getElementById('almacenista').value = item.almacenista;
        document.getElementById('estado').value = item.estado;
        document.getElementById('contenido').value = item.contenido;
        document.getElementById('noDeclarada').value = item.no_declared;
        document.getElementById('obs').value = item.observaciones;
        if(item.foto) {
            document.getElementById('photoPreview').src = item.foto;
            document.getElementById('photoPreview').classList.remove('hidden');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function eliminarRegistro(id) {
        if(confirm("¿Eliminar este registro?")) {
            await _supabase.from('registros_carga').delete().eq('id', id);
            await cargarDatosDeNube();
        }
    }

    function generarPDF(item) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pw = doc.internal.pageSize.getWidth();
        if(appLogo) doc.addImage(appLogo, 'PNG', 15, 10, 25, 25);
        doc.setFont("helvetica", "bold"); doc.setFontSize(16);
        doc.text("ACTA DE RECONOCIMIENTO FÍSICO", pw / 2, 20, { align: "center" });
        doc.setFontSize(10); doc.text("S.I.C.A.M. - Control de Carga", pw / 2, 26, { align: "center" });
        doc.line(15, 38, pw - 15, 38);
        let y = 45;
        const cell = (l, v, x, w) => {
            doc.setFont(undefined, 'bold'); doc.text(l, x + 2, y + 6);
            doc.setFont(undefined, 'normal'); doc.text(String(v || '-'), x + 35, y + 6);
            doc.rect(x, y, w, 10);
        };
        cell("ID CARGA:", item.id_carga, 15, 90); cell("FECHA:", item.fecha, 105, 90); y += 10;
        cell("MODALIDAD:", item.tipo, 15, 90); cell("ESTADO:", item.estado, 105, 90); y += 10;
        cell("PRECINTO:", item.num_precinto, 15, 90); cell("BULTOS:", item.cant_bultos, 105, 90); y += 10;
        cell("CLIENTE:", item.cliente, 15, 90); cell("CEDULA:", item.cedula, 105, 90); y += 10;
        cell("EMPRESA:", item.empresa, 15, 180); y += 15;
        doc.setFont(undefined, 'bold'); doc.text("CONTENIDO:", 15, y); y += 4;
        doc.rect(15, y, 180, 20); doc.setFont(undefined, 'normal');
        doc.text(doc.splitTextToSize(item.contenido || 'Sin descripción', 170), 17, y + 7); y += 25;
        if(item.foto) doc.addImage(item.foto, 'JPEG', 60, y, 90, 60);
        let fY = 265;
        doc.line(15, fY, 65, fY); doc.text("RESPONSABLE", 40, fY + 5, {align:"center"});
        doc.line(80, fY, 130, fY); doc.text("ALMACENISTA", 105, fY + 5, {align:"center"});
        doc.line(145, fY, 195, fY); doc.text("SENIAT", 170, fY + 5, {align:"center"});
        doc.save(`ACTA_${item.id_carga}.pdf`);
    }

    function mostrarSeccionCamara() { document.getElementById('seccionCamara').classList.remove('hidden'); }
    async function initCamera() { 
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
        document.getElementById('video').classList.remove('hidden');
        document.getElementById('snap').classList.remove('hidden');
    }
    function takePhoto() {
        const c = document.getElementById('canvas'); const v = document.getElementById('video');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        document.getElementById('photoPreview').src = c.toDataURL('image/jpeg', 0.6);
        document.getElementById('photoPreview').classList.remove('hidden');
        if(stream) stream.getTracks().forEach(t => t.stop());
    }
    function loadLogo(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { appLogo = ev.target.result; localStorage.setItem('srca_logo', appLogo); document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`; };
        reader.readAsDataURL(e.target.files[0]);
    }
    function limpiarForm() {
        document.getElementById('edit_id').value = '';
        ['idPrincipal', 'numPrecinto', 'cantBultos', 'encargado', 'cliente', 'cedulaCliente', 'empresaCliente', 'almacenista', 'contenido', 'noDeclarada', 'obs'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('photoPreview').classList.add('hidden');
    }
    function descargarActaManual() { if(currentPDFItem) generarPDF(currentPDFItem); }
</script>
