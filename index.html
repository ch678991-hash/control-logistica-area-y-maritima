<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.I.C.A.M. Elite 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --success: #10b981; --input-bg: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }
        
        /* Header & Logo */
        .header-main { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--card); margin-bottom: 15px; }
        .logo-box { width: 90px; height: 90px; margin: 0 auto 10px; border: 3px solid var(--accent); border-radius: 50%; overflow: hidden; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 1rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Stats Dashboard */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--accent); }
        .stat-item small { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }
        .stat-item div { font-size: 1.5rem; font-weight: 900; }

        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: -1px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 12px 12px 0 0; background: #334155; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.75rem; }
        .tab.active { background: white; color: var(--bg); }

        /* Form Card */
        .card { background: white; color: #1e293b; padding: 20px; border-radius: 0 12px 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-size: 0.65rem; font-weight: 800; margin-bottom: 4px; color: #475569; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(34, 211, 238, 0.2); }

        /* Camera */
        .cam-section { background: #f8fafc; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1; text-align: center; margin: 10px 0; }
        #video, #preview { width: 100%; max-width: 320px; border-radius: 12px; margin-top: 10px; display: none; border: 3px solid var(--accent); }

        /* Buttons */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: var(--bg); color: white; }
        .btn-save:active { transform: scale(0.98); }
        .btn-cam { background: #6366f1; color: white; }
        .btn-pdf { background: var(--success); color: white; display: none; }

        /* Table */
        .history { margin-top: 20px; background: var(--card); border-radius: 12px; padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; color: white; }
        th { text-align: left; padding: 12px; font-size: 0.7rem; color: var(--accent); border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 0.8rem; }
        .img-thumb { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .btn-action { padding: 6px; border-radius: 6px; border: none; cursor: pointer; margin-right: 4px; }
    </style>
</head>
<body>

<div class="header-main">
    <div class="logo-box" onclick="document.getElementById('fileIn').click()">
        <div id="logoContainer">LOGO</div>
        <input type="file" id="fileIn" hidden accept="image/*" onchange="uploadLogo(event)">
    </div>
    <h1>Sistema de Control de Carga Aérea y Marítima (S.I.C.A.M.)</h1>
</div>

<div class="stats">
    <div class="stat-item"><small id="lblModo">Marítimo</small><div id="countTotal" style="color:var(--accent)">0</div></div>
    <div class="stat-item"><small>Incidencias</small><div id="countInc" style="color:var(--danger)">0</div></div>
</div>

<div class="tabs">
    <button id="tabM" class="tab active" onclick="setModo('Marítimo')">🚢 MARÍTIMO</button>
    <button id="tabA" class="tab" onclick="setModo('Aéreo')">✈️ AÉREO</button>
</div>

<div class="card">
    <div class="grid">
        <div><label id="idLabel">N° Contenedor</label><input type="text" id="f_id" placeholder="Obligatorio"></div>
        <div><label>Fecha y Hora</label><input type="datetime-local" id="f_fecha"></div>
        <div><label>N° Precinto / Seguridad</label><input type="text" id="f_precinto"></div>
        
        <div><label>Inspector Actuante</label><input type="text" id="f_inspector" list="l_insp"></div>
        <div><label>Encargado Almacén</label><input type="text" id="f_almacen" list="l_alma"></div>
        
        <div class="full"><label>Cliente / Consignatario</label>
            <input type="text" id="f_cliente" list="l_cli" oninput="iaFills(this.value)" placeholder="Escriba para autocompletar...">
        </div>
        
        <div><label>Identificación (Cédula/RIF)</label><input type="text" id="f_cedula"></div>
        <div><label>Empresa</label><input type="text" id="f_empresa"></div>

        <div class="full"><label>Funcionario SENIAT</label><input type="text" id="f_seniat" list="l_seniat"></div>
        <div class="full"><label>Contenido Declarado</label><input type="text" id="f_contenido"></div>
        <div class="full"><label style="color:var(--danger)">Hallazgos No Declarados</label><textarea id="f_noDec" rows="2"></textarea></div>
        
        <div><label>Condición Física</label>
            <select id="f_estado">
                <option value="Excelente">Excelente ✅</option>
                <option value="Bueno">Bueno</option>
                <option value="Dañado">Dañado ⚠️</option>
                <option value="Sello Violado">Sello Violado 🚫</option>
            </select>
        </div>

        <div class="full">
            <div class="cam-section">
                <button class="btn btn-cam" id="camBtn" onclick="toggleCam()">📸 Iniciar Cámara</button>
                <video id="video" autoplay playsinline></video>
                <button class="btn" id="snapBtn" style="display:none; background:var(--danger); color:white" onclick="capture()">Capturar Foto</button>
                <img id="preview">
                <canvas id="canvas" style="display:none"></canvas>
            </div>
        </div>

        <div class="full"><label>Observaciones</label><textarea id="f_obs" rows="2"></textarea></div>
    </div>

    <button class="btn btn-save" id="saveBtn" onclick="saveData()">🚀 Registrar en la Nube</button>
    <button class="btn btn-pdf" id="pdfBtn" onclick="downloadLast()">⬇️ Descargar Acta PDF</button>
    <button class="btn" style="background:var(--success); color:white" onclick="exportExcel()">Reporte Excel</button>
</div>

<div class="history">
    <input type="text" id="search" onkeyup="renderTable()" placeholder="🔍 Buscar por ID o Cliente..." style="margin-bottom:10px; background:#0f172a; color:white; border:1px solid #334155">
    <table>
        <thead>
            <tr><th>ID CARGA</th><th>FECHA</th><th>CLIENTE</th><th>ESTADO</th><th>INSPECTOR</th><th>FOTO</th><th>ACCIÓN</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<datalist id="l_insp"></datalist><datalist id="l_alma"></datalist><datalist id="l_cli"></datalist><datalist id="l_seniat"></datalist>

<script>
    const URL = "https://bnbecaxqnbuzacdsbvco.supabase.co";
    const KEY = "sb_publishable_NYcOsL-Ot5lF9TEDMK8jpg_mXC6fdp7";
    const _sb = supabase.createClient(URL, KEY);

    let mainData = [];
    let currentModo = 'Marítimo';
    let lastReg = null;
    let stream = null;

    // Inicialización
    document.addEventListener('DOMContentLoaded', () => {
        loadSettings();
        fetchData();
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('f_fecha').value = now.toISOString().slice(0, 16);
    });

    function loadSettings() {
        const logo = localStorage.getItem('sicam_logo');
        if(logo) document.getElementById('logoContainer').innerHTML = `<img src="${logo}">`;
    }

    async function fetchData() {
        const { data, error } = await _sb.from('registros_carga').select('*').order('created_at', {ascending: false});
        if(!error) { mainData = data; renderTable(); buildLists(); }
    }

    function setModo(m) {
        currentModo = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(m === 'Marítimo' ? 'tabM' : 'tabA').classList.add('active');
        document.getElementById('lblModo').innerText = m;
        document.getElementById('idLabel').innerText = m === 'Marítimo' ? 'N° Contenedor' : 'N° Guía / Vuelo';
        renderTable();
    }

    function iaFills(name) {
        if(!name) return;
        const match = mainData.find(d => d.cliente && d.cliente.toLowerCase() === name.toLowerCase());
        if(match) {
            document.getElementById('f_cedula').value = match.cedula || '';
            document.getElementById('f_empresa').value = match.empresa || '';
        }
    }

    function buildLists() {
        const getList = (field) => [...new Set(mainData.map(d => d[field]).filter(Boolean))];
        const fill = (id, list) => document.getElementById(id).innerHTML = list.map(v => `<option value="${v}">`).join('');
        
        fill('l_insp', getList('encargado'));
        fill('l_alma', getList('almacenista'));
        fill('l_cli', getList('cliente'));
        // Extraer funcionario de observaciones si no hay columna
        const seniats = mainData.map(d => d.observaciones?.includes('SENIAT:') ? d.observaciones.split('SENIAT:')[1].trim() : null).filter(Boolean);
        fill('l_seniat', [...new Set(seniats)]);
    }

    async function saveData() {
        const id = document.getElementById('f_id').value;
        const cli = document.getElementById('f_cliente').value;
        if(!id || !cli) return alert("ID y Cliente son obligatorios");

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ REGISTRANDO...";
        btn.disabled = true;

        const seniat = document.getElementById('f_seniat').value;
        const obs = document.getElementById('f_obs').value;

        const payload = {
            id_carga: id,
            tipo: currentModo,
            fecha: document.getElementById('f_fecha').value.replace('T', ' '),
            bultos: document.getElementById('f_precinto').value,
            encargado: document.getElementById('f_inspector').value,
            almacenista: document.getElementById('f_almacen').value,
            cliente: cli,
            cedula: document.getElementById('f_cedula').value,
            empresa: document.getElementById('f_empresa').value,
            contenido: document.getElementById('f_contenido').value,
            no_declared: document.getElementById('f_noDec').value,
            estado: document.getElementById('f_estado').value,
            observaciones: seniat ? `${obs} | SENIAT: ${seniat}` : obs,
            foto: document.getElementById('preview').src.includes('data:image') ? document.getElementById('preview').src : ''
        };

        const { error } = await _sb.from('registros_carga').insert([payload]);

        if(error) {
            alert("Error: " + error.message);
        } else {
            alert("✅ Guardado en la nube");
            lastReg = { ...payload, seniat };
            document.getElementById('pdfBtn').style.display = 'block';
            fetchData();
        }
        btn.innerText = "🚀 Registrar en la Nube";
        btn.disabled = false;
    }

    // UI & Table
    function renderTable() {
        const body = document.getElementById('tableBody');
        const search = document.getElementById('search').value.toLowerCase();
        const filtered = mainData.filter(d => d.tipo === currentModo);
        
        document.getElementById('countTotal').innerText = filtered.length;
        document.getElementById('countInc').innerText = filtered.filter(d => d.estado !== 'Excelente' && d.estado !== 'Bueno').length;

        body.innerHTML = filtered.filter(d => d.id_carga.toLowerCase().includes(search) || d.cliente.toLowerCase().includes(search))
            .map(d => `
                <tr>
                    <td><b>${d.id_carga}</b></td>
                    <td><small>${d.fecha.split(' ')[0]}</small></td>
                    <td>${d.cliente}</td>
                    <td>${d.estado}</td>
                    <td>${d.encargado}</td>
                    <td>${d.foto ? `<img src="${d.foto}" class="img-thumb">` : '—'}</td>
                    <td>
                        <button class="btn-action" style="background:#3b82f6;color:white" onclick='genPDF(${JSON.stringify(d).replace(/'/g, "&apos;")})'>📄</button>
                    </td>
                </tr>
            `).join('');
    }

    // Cámara
    async function toggleCam() {
        const v = document.getElementById('video');
        const b = document.getElementById('camBtn');
        const s = document.getElementById('snapBtn');

        if(!stream) {
            stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
            v.srcObject = stream;
            v.style.display = 'block';
            b.innerText = "❌ Cerrar";
            s.style.display = 'block';
        } else {
            stopCam();
        }
    }

    function stopCam() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
        document.getElementById('video').style.display = 'none';
        document.getElementById('camBtn').innerText = "📸 Iniciar Cámara";
        document.getElementById('snapBtn').style.display = 'none';
    }

    function capture() {
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const img = document.getElementById('preview');
        img.src = c.toDataURL('image/jpeg', 0.7);
        img.style.display = 'block';
        stopCam();
    }

    // Reportes
    function genPDF(d) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const logo = localStorage.getItem('sicam_logo');
        
        if(logo) doc.addImage(logo, 'JPEG', 85, 10, 30, 30);
        doc.setFontSize(16); doc.text("ACTA DE RECONOCIMIENTO FÍSICO", 105, 50, {align:'center'});
        doc.setFontSize(10); doc.text(`Modalidad: ${d.tipo} | Fecha: ${d.fecha}`, 105, 58, {align:'center'});
        doc.line(20, 65, 190, 65);
        
        let y = 75;
        const info = [
            ["ID CARGA:", d.id_carga], ["CLIENTE:", d.cliente], ["RIF/CÉDULA:", d.cedula],
            ["EMPRESA:", d.empresa], ["ESTADO:", d.estado], ["CONTENIDO:", d.contenido]
        ];
        info.forEach(r => { doc.setFont(undefined, 'bold'); doc.text(r[0], 25, y); doc.setFont(undefined, 'normal'); doc.text(String(r[1]), 70, y); y+=8; });

        if(d.foto) doc.addImage(d.foto, 'JPEG', 55, y+5, 100, 75);
        
        doc.text("___________________", 50, 270, {align:'center'}); doc.text("INSPECTOR", 50, 275, {align:'center'});
        doc.text("___________________", 160, 270, {align:'center'}); doc.text("ALMACENISTA", 160, 275, {align:'center'});
        
        doc.save(`Acta_${d.id_carga}.pdf`);
    }

    function downloadLast() { if(lastReg) genPDF(lastReg); }
    function exportExcel() { 
        const ws = XLSX.utils.json_to_sheet(mainData.map(({foto, ...d}) => d)); 
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Datos"); 
        XLSX.writeFile(wb, "Reporte_SICAM.xlsx"); 
    }
    function uploadLogo(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { localStorage.setItem('sicam_logo', ev.target.result); loadSettings(); };
        reader.readAsDataURL(e.target.files[0]);
    }
</script>
</body>
</html>
