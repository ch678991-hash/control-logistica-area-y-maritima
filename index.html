<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.C.C.A.M. - Sistema de Control de Carga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --warning: #facc15; --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .logo-container { text-align: center; margin-bottom: 10px; cursor: pointer; }
        .logo-placeholder { 
            width: 100px; height: 100px; border: 2px dashed var(--accent); 
            border-radius: 50%; display: inline-flex; align-items: center; 
            justify-content: center; overflow: hidden; background: #1e293b;
        }
        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .header-app { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .header-app h1 { font-size: 1.1rem; letter-spacing: 1px; color: var(--accent); margin: 0; text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .stat-card p { margin: 5px 0 0; font-size: 1.6rem; font-weight: 800; }
        
        .alert-active { background: #450a0a; border-color: var(--danger); animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }

        .tabs { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 15px; border: none; border-radius: 12px 12px 0 0; cursor: pointer; font-weight: bold; color: #94a3b8; background: #1e293b; font-size: 0.8rem; }
        .tab.active { background: white; color: #0f172a; }

        .main-card { background: white; color: #1e293b; padding: 20px; border-radius: 0 12px 12px 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 650px) { .form-grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-weight: 700; font-size: 0.7rem; margin-bottom: 5px; color: #475569; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; }
        
        .camera-section { background: #f1f5f9; padding: 15px; border-radius: 10px; border: 2px dashed #cbd5e1; text-align: center; }
        #video, #photoPreview { width: 100%; border-radius: 10px; margin-top: 10px; }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }
        .btn-save { background: #0f172a; color: white; }
        .btn-download { background: var(--success); color: white; display: none; margin-top: 5px; }

        .search-box { margin-bottom: 15px; background: #1e293b; padding: 10px; border-radius: 10px; border: 1px solid #334155; }
        .search-box input { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; width: 100%; border-radius: 8px; }

        .history-section { margin-top: 30px; background: var(--card); border-radius: 12px; padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid #334155; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        .img-table { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }

        .action-btn { border: none; padding: 8px; border-radius: 5px; cursor: pointer; color: white; margin-right: 3px; font-size: 0.8rem; }
        .btn-edit { background: var(--warning); color: #000; }
        .btn-del { background: var(--danger); }
        .btn-pdf { background: #3b82f6; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" onclick="document.getElementById('logoInput').click()">
        <div class="logo-placeholder" id="logoDisplay"><span>SUBIR LOGO</span></div>
        <input type="file" id="logoInput" hidden accept="image/*" onchange="loadLogo(event)">
    </div>

    <div class="header-app">
        <h1>SISTEMA DE CONTROL DE CARGA AÉREA Y MARÍTIMA</h1>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h4>REGISTROS</h4><p id="cTotal" style="color:var(--accent)">0</p></div>
        <div id="incidenciaCard" class="stat-card"><h4>INCIDENCIAS</h4><p id="cInc" style="color:var(--danger)">0</p></div>
    </div>

    <div class="tabs">
        <button id="tabM" class="tab active" onclick="cambiarModo('Marítimo')">🚢 MARÍTIMO</button>
        <button id="tabA" class="tab" onclick="cambiarModo('Aéreo')">✈️ AÉREO</button>
    </div>

    <div class="main-card">
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            
            <div><label id="labelId">N° Contenedor</label><input type="text" id="idPrincipal"></div>
            <div><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"></div>
            <div><label id="labelBultos">N° Precinto</label><input type="text" id="bultos" placeholder="Dato de seguridad"></div>
            
            <div><label>Inspector Responsable</label><input type="text" id="encargado"></div>
            <div><label style="color:#0ea5e9">Encargado de Almacén</label><input type="text" id="almacenista"></div>
            <div><label style="color:#d97706">Funcionario SENIAT</label><input type="text" id="seniat" style="background:#fffbeb"></div>
            
            <div><label>Cliente / Consignatario</label><input type="text" id="cliente"></div>
            <div class="full"><label>Contenido de la Carga</label><input type="text" id="contenido" placeholder="Descripción de mercancía"></div>
            
            <div class="full">
                <label style="color:#be123c">⚠️ Hallazgos de Carga NO Declarada</label>
                <textarea id="noDeclarada" style="background:#fff1f2; border-color:#fecdd3; color:#9f1239" rows="2" placeholder="Mercancía sobrante..."></textarea>
            </div>

            <div>
                <label>Condición Física</label>
                <select id="estado">
                    <option value="Excelente">Excelente ✅</option>
                    <option value="Bueno">Bueno</option>
                    <option value="Dañado">Dañado ⚠️</option>
                    <option value="Mojado">Mojado 💧</option>
                    <option value="Sello Violado">Sello Violado 🚫</option>
                    <option value="Bulto Faltante">Bulto Faltante 📉</option>
                </select>
            </div>

            <div class="camera-section full">
                <button class="btn" style="background:#a855f7; color:white; padding:12px;" onclick="initCamera()">📸 ACTIVAR CÁMARA</button>
                <video id="video" autoplay playsinline style="display:none"></video>
                <button id="snap" class="btn" style="display:none; background:var(--danger); color:white; margin-top:10px" onclick="takePhoto()">CAPTURAR FOTO</button>
                <img id="photoPreview" style="display:none">
                <canvas id="canvas" style="display:none"></canvas>
            </div>

            <div class="full"><label>Observaciones</label><textarea id="obs" rows="2"></textarea></div>
        </div>

        <div class="actions">
            <button id="btnGuardar" class="btn btn-save" onclick="registrar()">REGISTRAR Y PROCESAR</button>
            <button id="btnDescargar" class="btn btn-download" onclick="descargarActaManual()">⬇️ DESCARGAR ACTA EN DISPOSITIVO</button>
            <button class="btn" style="background:#10b981; color:white" onclick="exportarExcel()">DESCARGAR EXCEL GENERAL</button>
        </div>
    </div>

    <div class="history-section">
        <div class="search-box">
            <input type="text" id="buscador" onkeyup="actualizarUI()" placeholder="🔍 Buscar por ID, Cliente o Funcionario...">
        </div>
        <table id="tablaDatos">
            <thead>
                <tr>
                    <th>ID Carga</th>
                    <th>Estado</th>
                    <th>SENIAT</th>
                    <th>Foto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let modoActual = 'Marítimo';
    let db = JSON.parse(localStorage.getItem('control_carga_v5')) || [];
    let appLogo = localStorage.getItem('srca_logo') || '';
    let stream;
    let ultimoItemGuardado = null; // Para saber qué PDF descargar manualmente

    if(appLogo) document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`;

    function loadLogo(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            appLogo = ev.target.result;
            localStorage.setItem('srca_logo', appLogo);
            document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    async function initCamera() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
        document.getElementById('video').style.display = 'block';
        document.getElementById('snap').style.display = 'block';
    }

    function takePhoto() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const data = canvas.toDataURL('image/jpeg', 0.6);
        document.getElementById('photoPreview').src = data;
        document.getElementById('photoPreview').style.display = 'block';
        if (stream) stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        document.getElementById('snap').style.display = 'none';
    }

    function cambiarModo(modo) {
        modoActual = modo;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(modo === 'Marítimo' ? 'tabM' : 'tabA').classList.add('active');
        document.getElementById('labelId').innerText = modo === 'Marítimo' ? "N° Contenedor" : "N° Guía / Vuelo";
        document.getElementById('labelBultos').innerText = modo === 'Marítimo' ? "N° Precinto" : "Bultos Reconocidos";
        actualizarUI();
    }

    function registrar() {
        const editIndex = parseInt(document.getElementById('editIndex').value);
        const item = {
            id: document.getElementById('idPrincipal').value,
            tipo: modoActual,
            fecha: document.getElementById('fechaHora').value.replace('T', ' '),
            bultos: document.getElementById('bultos').value,
            encargado: document.getElementById('encargado').value,
            almacenista: document.getElementById('almacenista').value,
            seniat: document.getElementById('seniat').value,
            cliente: document.getElementById('cliente').value,
            contenido: document.getElementById('contenido').value,
            noDeclarado: document.getElementById('noDeclarada').value,
            estado: document.getElementById('estado').value,
            obs: document.getElementById('obs').value,
            foto: document.getElementById('photoPreview').src
        };

        if(!item.id || !item.cliente) return alert("Complete los campos obligatorios.");
        
        if(editIndex === -1) {
            db.push(item);
        } else {
            db[editIndex] = item;
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnGuardar').innerText = "REGISTRAR Y PROCESAR";
            document.getElementById('btnGuardar').style.background = "#0f172a";
        }
        
        localStorage.setItem('control_carga_v5', JSON.stringify(db));
        
        // NO descarga automáticamente. Guarda referencia y muestra botón.
        ultimoItemGuardado = item;
        document.getElementById('btnDescargar').style.display = 'block';
        
        actualizarUI();
        alert("¡Registro guardado con éxito! Puede descargar el acta ahora si lo desea.");
    }

    function descargarActaManual() {
        if(ultimoItemGuardado) {
            generarPDF(ultimoItemGuardado);
            document.getElementById('btnDescargar').style.display = 'none';
            limpiarFormulario();
        }
    }

    function limpiarFormulario() {
        ['idPrincipal', 'fechaHora', 'bultos', 'cliente', 'contenido', 'noDeclarada', 'obs'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('photoPreview').style.display = 'none';
        document.getElementById('photoPreview').src = '';
    }

    function editar(index) {
        const item = db[index];
        document.getElementById('editIndex').value = index;
        cambiarModo(item.tipo);
        document.getElementById('idPrincipal').value = item.id;
        document.getElementById('fechaHora').value = item.fecha.replace(' ', 'T');
        document.getElementById('bultos').value = item.bultos;
        document.getElementById('encargado').value = item.encargado;
        document.getElementById('almacenista').value = item.almacenista;
        document.getElementById('seniat').value = item.seniat;
        document.getElementById('cliente').value = item.cliente;
        document.getElementById('contenido').value = item.contenido;
        document.getElementById('noDeclarada').value = item.noDeclarado;
        document.getElementById('estado').value = item.estado;
        document.getElementById('obs').value = item.obs;
        if(item.foto) {
            document.getElementById('photoPreview').src = item.foto;
            document.getElementById('photoPreview').style.display = 'block';
        }
        document.getElementById('btnGuardar').innerText = "ACTUALIZAR REGISTRO";
        document.getElementById('btnGuardar').style.background = "var(--warning)";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function eliminar(index) {
        if(confirm("¿Seguro que desea eliminar este registro?")) {
            db.splice(index, 1);
            localStorage.setItem('control_carga_v5', JSON.stringify(db));
            actualizarUI();
        }
    }

    function generarPDF(item) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        if(appLogo) doc.addImage(appLogo, 'PNG', 15, 10, 25, 25);
        doc.setFontSize(16); doc.text("ACTA DE RECONOCIMIENTO FÍSICO", 50, 20);
        doc.setFontSize(9); doc.text(`Modalidad: ${item.tipo} | Fecha: ${item.fecha}`, 50, 26);
        doc.line(15, 40, 195, 40);
        doc.text(`Identificador: ${item.id}`, 15, 50);
        doc.text(`Cliente: ${item.cliente}`, 15, 57);
        doc.text(`Estado: ${item.estado}`, 15, 64);
        if(item.noDeclarado) { doc.setTextColor(200, 0, 0); doc.text(`NO DECLARADO: ${item.noDeclarado}`, 15, 72); doc.setTextColor(0); }
        if(item.foto && item.foto.startsWith('data')) doc.addImage(item.foto, 'JPEG', 15, 85, 80, 60);
        doc.text("________________", 20, 230); doc.text("INSPECTOR", 25, 235);
        doc.text("________________", 80, 230); doc.text("SENIAT", 85, 235);
        doc.text("________________", 140, 230); doc.text("ALMACÉN", 145, 235);
        doc.save(`ACTA_${item.id}.pdf`);
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('cuerpoTabla');
        const filtro = document.getElementById('buscador').value.toLowerCase();
        cuerpo.innerHTML = '';
        const total = db.length;
        const incidencias = db.filter(i => i.estado !== 'Excelente' && i.estado !== 'Bueno').length;
        document.getElementById('cTotal').innerText = total;
        document.getElementById('cInc').innerText = incidencias;
        document.getElementById('incidenciaCard').className = incidencias > 0 ? 'stat-card alert-active' : 'stat-card';

        db.forEach((item, index) => {
            const dataRow = `${item.id} ${item.cliente} ${item.seniat}`.toLowerCase();
            if(dataRow.includes(filtro)) {
                const row = `
                    <tr>
                        <td><b>${item.id}</b></td>
                        <td style="color:${(item.estado === 'Bueno' || item.estado === 'Excelente') ? '#10b981' : '#ef4444'}">${item.estado}</td>
                        <td><small>${item.seniat}</small></td>
                        <td><img src="${item.foto || ''}" class="img-table"></td>
                        <td>
                            <button class="action-btn btn-pdf" onclick="generarPDF(db[${index}])" title="PDF">📄</button>
                            <button class="action-btn btn-edit" onclick="editar(${index})" title="Editar">✏️</button>
                            <button class="action-btn btn-del" onclick="eliminar(${index})" title="Eliminar">🗑️</button>
                        </td>
                    </tr>
                `;
                cuerpo.insertAdjacentHTML('afterbegin', row);
            }
        });
    }

    function exportarExcel() {
        const datosLimpios = db.map(({foto, ...resto}) => ({
            Modalidad: resto.tipo, Identificador: resto.id, Fecha: resto.fecha, Seguridad: resto.bultos, Cliente: resto.cliente, Contenido: resto.contenido, Hallazgos: resto.noDeclarado || "NINGUNO", Estado: resto.estado, Inspector: resto.encargado, Aduana: resto.seniat, Almacen: resto.almacenista, Observaciones: resto.obs
        }));
        const ws = XLSX.utils.json_to_sheet(datosLimpios);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reporte");
        XLSX.writeFile(wb, "Reporte_Aduanero.xlsx");
    }
    actualizarUI();
</script>
</body>
</html>
