<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.C.C.A.M. Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9; --danger: #ef4444; --warning: #facc15; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .main-card { background: white; color: #1e293b; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        label { font-size: 0.7rem; font-weight: bold; color: #475569; display: block; margin-bottom: 2px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-save { background: var(--bg); color: white; }
        .btn-upd { background: var(--warning); display: none; }
        .history { background: var(--card); margin-top: 20px; padding: 10px; border-radius: 10px; }
        #globalSearch { width: 100%; padding: 12px; background: #0f172a; color: white; border: 1px solid var(--accent); margin-bottom: 10px; border-radius: 8px; }
        .wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 0.8rem; }
        th { color: var(--accent); border-bottom: 2px solid #334155; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
        .img-table { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .action-btn { padding: 5px; border-radius: 4px; border: none; cursor: pointer; margin-right: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div id="logoDisplay" onclick="document.getElementById('logoInput').click()" style="width:70px;height:70px;border:2px dashed var(--accent);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;background:#1e293b;cursor:pointer;">LOGO</div>
        <input type="file" id="logoInput" class="hidden" onchange="loadLogo(event)">
        <h2 style="font-size: 0.9rem; color: var(--accent);">SISTEMA DE CONTROL DE CARGA</h2>
    </div>

    <div style="display: flex; gap: 5px;">
        <button id="tabM" style="flex:1;padding:10px;" onclick="cambiarModo('Marítimo')">🚢 MARÍTIMO</button>
        <button id="tabA" style="flex:1;padding:10px;" onclick="cambiarModo('Aéreo')">✈️ AÉREO</button>
    </div>

    <div class="main-card">
        <input type="hidden" id="editId">
        <div class="form-grid">
            <div><label id="labelId">ID Carga</label><input type="text" id="idPrincipal"></div>
            <div><label>Fecha</label><input type="datetime-local" id="fechaHora"></div>
            <div><label>Precinto</label><input type="text" id="bultos"></div>
            <div><label>Inspector</label><input type="text" id="encargado"></div>
            <div><label>SENIAT</label><input type="text" id="funcionarioSeniat"></div>
            <div class="full"><label>Cliente</label><input type="text" id="cliente" oninput="autocompletar(this.value)"></div>
            <div><label>Empresa</label><input type="text" id="empresaCliente"></div>
            <div><label>Cédula/RIF</label><input type="text" id="cedulaCliente"></div>
            <div class="full"><label>Contenido</label><input type="text" id="contenido"></div>
            <div class="full"><label>Hallazgos</label><textarea id="noDeclarada"></textarea></div>
            <div class="full"><button class="btn" style="background:#6366f1;color:white;" onclick="initCam()">📸 TOMAR FOTO</button></div>
            <video id="video" class="hidden" autoplay playsinline style="width:100%;max-width:200px;"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <img id="photoPreview" class="hidden" style="width:100%;max-width:200px;">
        </div>
        <button id="btnSave" class="btn btn-save" onclick="guardar()">🚀 REGISTRAR</button>
        <button id="btnUpd" class="btn btn-upd" onclick="guardar()">💾 ACTUALIZAR</button>
    </div>

    <div class="history">
        <input type="text" id="globalSearch" placeholder="🔍 BUSCAR EN REGISTROS..." onkeyup="render()">
        <div class="wrapper">
            <table>
                <thead>
                    <tr><th>ACCIONES</th><th>ID</th><th>CLIENTE</th><th>EMPRESA</th><th>FECHA</th><th>SENIAT</th><th>ESTADO</th><th>FOTO</th></tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const SB_URL = "https://bnbecaxqnbuzacdsbvco.supabase.co"; 
    const SB_KEY = "sb_publishable_NYcOsL-Ot5lF9TEDMK8jpg_mXC6fdp7";
    const _sb = supabase.createClient(SB_URL, SB_KEY);
    let db = [], modo = 'Marítimo', imgData = "", stream;

    async function load() {
        const { data } = await _sb.from('registros_carga').select('*').order('created_at', { ascending: false });
        db = data || []; render();
    }

    function render() {
        const bus = document.getElementById('globalSearch').value.toLowerCase();
        const body = document.getElementById('tablaBody');
        body.innerHTML = "";
        db.filter(r => r.tipo === modo && Object.values(r).some(v => String(v).toLowerCase().includes(bus))).forEach(r => {
            body.innerHTML += `<tr>
                <td>
                    <button class="action-btn" style="background:orange" onclick="editar(${r.id})">✏️</button>
                    <button class="action-btn" style="background:red;color:white" onclick="eliminar(${r.id})">🗑️</button>
                </td>
                <td>${r.id_carga}</td><td>${r.cliente}</td><td>${r.empresa}</td><td>${r.fecha}</td><td>${r.funcionario_seniat || '-'}</td><td>${r.estado}</td>
                <td>${r.foto ? `<img src="${r.foto}" class="img-table">` : 'No'}</td>
            </tr>`;
        });
    }

    function autocompletar(v) {
        const r = db.find(i => i.cliente && i.cliente.toLowerCase() === v.trim().toLowerCase());
        if(r) { document.getElementById('empresaCliente').value = r.empresa; document.getElementById('cedulaCliente').value = r.cedula; }
    }

    function editar(id) {
        const r = db.find(i => i.id === id);
        document.getElementById('editId').value = r.id;
        document.getElementById('idPrincipal').value = r.id_carga;
        document.getElementById('cliente').value = r.cliente;
        document.getElementById('empresaCliente').value = r.empresa;
        document.getElementById('cedulaCliente').value = r.cedula;
        document.getElementById('funcionario_seniat').value = r.funcionario_seniat;
        document.getElementById('btnSave').style.display = 'none';
        document.getElementById('btnUpd').style.display = 'block';
        window.scrollTo(0,0);
    }

    async function guardar() {
        const id_db = document.getElementById('editId').value;
        const obj = {
            id_carga: document.getElementById('idPrincipal').value,
            cliente: document.getElementById('cliente').value,
            empresa: document.getElementById('empresaCliente').value,
            cedula: document.getElementById('cedulaCliente').value,
            funcionario_seniat: document.getElementById('funcionarioSeniat').value,
            fecha: document.getElementById('fechaHora').value,
            tipo: modo, foto: imgData
        };
        let res;
        if(id_db) res = await _sb.from('registros_carga').update(obj).eq('id', id_db);
        else res = await _sb.from('registros_carga').insert([obj]);
        
        if(res.error) alert("Error");
        else { alert("OK"); location.reload(); }
    }

    async function eliminar(id) { if(confirm("¿Borrar?")) { await _sb.from('registros_carga').delete().eq('id', id); load(); } }
    function cambiarModo(m) { modo = m; render(); }
    async function initCam() { 
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        const v = document.getElementById('video'); v.srcObject = stream; v.classList.remove('hidden');
        v.onclick = () => {
            const canvas = document.getElementById('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            imgData = canvas.toDataURL('image/jpeg', 0.5);
            document.getElementById('photoPreview').src = imgData;
            document.getElementById('photoPreview').classList.remove('hidden');
            stream.getTracks().forEach(t => t.stop()); v.classList.add('hidden');
        };
    }
    document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
