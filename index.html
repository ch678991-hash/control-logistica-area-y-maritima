<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.I.C.A.M. Elite - Pro Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --success: #10b981; --border: #334155; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden;}

        /* --- LOGIN STYLES --- */
        #auth-container {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .auth-card {
            background: var(--card); padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        .auth-card h2 { color: var(--accent); margin-top: 0; font-size: 1.2rem; }
        .auth-card input { 
            background: #0f172a; border: 1px solid var(--border); color: white;
            margin-bottom: 15px; padding: 15px; width: 100%; border-radius: 10px; font-size: 1rem;
        }
        .btn-auth { background: var(--accent); color: #0f172a; border:none; padding:15px; border-radius:10px; font-weight:bold; width:100%; cursor:pointer; }
        .toggle-auth { color: var(--accent); font-size: 0.8rem; cursor: pointer; margin-top: 15px; display: block; text-decoration: underline; }
        
        /* --- APP STYLES --- */
        #app-content { display: none; }
        
        .logo-container { text-align: center; margin-bottom: 10px; position: relative; }
        .nav-btns { position: absolute; right: 10px; top: 10px; display: flex; gap: 5px; }
        .logout-btn { background: var(--danger); border:none; color:white; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor:pointer;}
        #admin-toggle-btn { background: var(--warning); border:none; color:white; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor:pointer; display: none; font-weight: bold; }
        
        .logo-placeholder { width: 90px; height: 90px; border: 2px dashed var(--accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; background: #1e293b; cursor: pointer; overflow: hidden; }
        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .header-app { text-align: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header-app h1 { font-size: 1.1rem; color: var(--accent); margin: 0; text-transform: uppercase; }

        /* --- PANEL DE CONTROL MAESTRO --- */
        #admin-panel { background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 2px solid var(--warning); display: none; }
        .user-row { background: #0f172a; margin-bottom: 10px; padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .user-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .btn-panel { padding: 8px; border-radius: 6px; border: none; color: white; cursor: pointer; font-size: 0.7rem; font-weight: bold; margin-right: 5px; }

        /* Dashboard y Formulario */
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-card h4 { font-size: 0.6rem; color: #94a3b8; margin: 0; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: 800; }

        .tabs { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; color: #94a3b8; background: #1e293b; font-size: 0.75rem; transition: 0.2s; }
        .tab.active { background: white; color: #0f172a; transform: translateY(-2px); }

        .main-card { background: white; color: #1e293b; padding: 20px; border-radius: 0 10px 10px 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-weight: 800; font-size: 0.7rem; margin-bottom: 5px; color: #334155; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
        
        .camera-box { background: #f1f5f9; padding: 15px; border-radius: 12px; border: 2px solid #cbd5e1; margin-top: 10px; text-align: center; }
        .hidden { display: none !important; }
        #video, #photoPreview { width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid #94a3b8; max-width: 320px; }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: #0f172a; color: white; border: 2px solid var(--accent); }
        .btn-download { background: var(--success); color: white; display: none; }

        .history-section { background: var(--card); border-radius: 10px; padding: 15px; margin-top: 25px; }
        .search-box input { background: #0f172a; color: white; border: 1px solid var(--border); padding: 14px; width: 100%; border-radius: 10px; margin-bottom: 15px; }
        
        .table-container { overflow-x: auto; width: 100%; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 2200px; } 
        th { text-align: left; padding: 14px; color: var(--accent); font-size: 0.75rem; border-bottom: 2px solid var(--border); text-transform: uppercase; background: #1e293b; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: white; vertical-align: middle; }
        .img-table { width: 65px; height: 65px; border-radius: 6px; object-fit: cover; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="auth-container">
        <div class="auth-card">
            <h2 id="auth-title">S.I.C.A.M. ACCESO</h2>
            <div id="login-fields">
                <input type="text" id="user-input" placeholder="Usuario (admin)" autocomplete="off">
                <input type="password" id="pass-input" placeholder="Contraseña">
                <button class="btn-auth" onclick="manejarAuth()">ENTRAR AL SISTEMA</button>
                <span class="toggle-auth" onclick="toggleAuthMode(true)">¿Eres nuevo? Regístrate aquí</span>
            </div>
            <div id="register-fields" class="hidden">
                <input type="text" id="reg-user" placeholder="Crea tu Usuario">
                <input type="password" id="reg-pass" placeholder="Crea tu Contraseña">
                <input type="password" id="reg-master" placeholder="Código de Autorización">
                <button class="btn-auth" style="background:var(--success)" onclick="registrarUsuario()">CREAR CUENTA</button>
                <span class="toggle-auth" onclick="toggleAuthMode(false)">Ya tengo cuenta, volver</span>
            </div>
        </div>
    </div>

    <!-- CONTENIDO DE LA APP -->
    <div id="app-content">
        <div class="logo-container">
            <div class="nav-btns">
                <button id="admin-toggle-btn" onclick="togglePanelAdmin()">⚙️ CONTROL MAESTRO</button>
                <button class="logout-btn" onclick="cerrarSesion()">SALIR</button>
            </div>
            <div class="logo-placeholder" id="logoDisplay" onclick="document.getElementById('logoInput').click()">
                <span>LOGO</span>
            </div>
            <input type="file" id="logoInput" hidden accept="image/*" onchange="loadLogo(event)">
        </div>

        <!-- PANEL DE SÚPER USUARIO (MASTER) -->
        <div id="admin-panel">
            <h3 style="color:var(--warning); margin-top:0">🛠️ ADMINISTRACIÓN DE CUENTAS</h3>
            <div id="user-list-admin"></div>
            <button class="btn" style="background:var(--card); margin-top:15px; color:var(--accent); border:1px solid var(--accent); height:40px; padding:0" onclick="togglePanelAdmin()">CERRAR PANEL</button>
        </div>

        <div class="header-app">
            <h1>SISTEMA DE CONTROL DE CARGA</h1>
            <small id="welcome-user" style="color: var(--accent); font-weight: bold;"></small>
        </div>

        <div class="dashboard">
            <div class="stat-card"><h4>TOTAL REGISTROS</h4><p id="cTotal" style="color:var(--accent)">0</p></div>
            <div class="stat-card"><h4>MODO ACTIVO</h4><p id="txtModo" style="color:var(--success)">MARÍTIMO</p></div>
        </div>

        <div class="tabs">
            <button id="tabM" class="tab active" onclick="cambiarModo('Marítimo')">🚢 MARÍTIMO</button>
            <button id="tabA" class="tab" onclick="cambiarModo('Aéreo')">✈️ AÉREO</button>
        </div>

        <div class="main-card">
            <input type="hidden" id="edit_id">
            <div class="form-grid">
                <div><label id="labelId">N° Contenedor / Guía</label><input type="text" id="idPrincipal"></div>
                <div><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"></div>
                <div><label>N° de Precinto</label><input type="text" id="numPrecinto"></div>
                <div><label>Cantidad de Bultos</label><input type="number" id="cantBultos"></div>
                <div class="full"><label>Responsable de Carga</label><input type="text" id="encargado"></div>
                
                <div class="full">
                    <label>Cliente</label>
                    <input type="text" id="cliente" list="clientesList" oninput="autocompletarCliente(this.value)">
                    <datalist id="clientesList"></datalist>
                </div>
                
                <div><label>Cédula / ID</label><input type="text" id="cedulaCliente"></div>
                <div class="full"><label>Empresa Solicitante</label><input type="text" id="empresaCliente"></div>
                
                <div><label>Encargado Almacén</label><input type="text" id="almacenista"></div>
                <div><label>Condición Física</label>
                    <select id="estado">
                        <option value="Excelente">Excelente ✅</option>
                        <option value="Bueno">Bueno</option>
                        <option value="Dañado">Dañado ⚠️</option>
                        <option value="Sello Violado">Sello Violado 🚫</option>
                    </select>
                </div>
                <div class="full"><label>Contenido Declarado</label><textarea id="contenido" rows="2"></textarea></div>
                <div class="full"><label style="color:var(--danger)">Hallazgos No Declarados</label><textarea id="noDeclarada" rows="2"></textarea></div>
                
                <!-- CÁMARA OPTIMIZADA -->
                <div class="full">
                    <button type="button" class="btn" style="background:#6366f1; color:white;" onclick="mostrarSeccionCamara()">📸 CAPTURAR FOTO</button>
                    <div id="seccionCamara" class="camera-box hidden">
                        <video id="video" autoplay playsinline class="hidden"></video>
                        <button id="initCamBtn" class="btn" style="background:var(--success); color:white; margin:10px 0" onclick="initCamera()">ENCENDER CÁMARA</button>
                        <button id="snap" class="btn hidden" style="background:var(--danger); color:white" onclick="takePhoto()">TOMAR FOTO</button>
                        <img id="photoPreview" class="hidden">
                        <canvas id="canvas" class="hidden"></canvas>
                    </div>
                </div>

                <div class="full"><label>Observaciones Finales</label><textarea id="obs" rows="2"></textarea></div>
            </div>

            <div class="actions">
                <button id="btnGuardar" class="btn btn-save" onclick="registrarEnLaNube()">🚀 GUARDAR REGISTRO</button>
                <button id="btnDescargar" class="btn btn-download" onclick="descargarActaManual()">⬇️ GENERAR ACTA PDF</button>
            </div>
        </div>

        <div class="history-section">
            <h3 style="color:var(--accent); font-size: 0.8rem;">HISTORIAL DE REGISTROS</h3>
            <div class="search-box">
                <input type="text" id="buscador" onkeyup="actualizarUI()" placeholder="🔍 Buscar registros...">
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Acciones</th><th>ID Carga</th><th>Fecha</th><th>Precinto</th><th>Bultos</th><th>Responsable</th><th>Cliente</th><th>Cédula</th><th>Empresa</th><th>Estado</th><th>Foto</th></tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const SB_URL = "https://bnbecaxqnbuzacdsbvco.supabase.co"; 
    const SB_KEY = "sb_publishable_NYcOsL-Ot5lF9TEDMK8jpg_mXC6fdp7";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    const AUTH_MASTER_CODE = "SICAM2026"; 

    let usuarios = JSON.parse(localStorage.getItem('sicam_db_users')) || {
        "admin": { pass: "1234", rol: "operador", status: "activo" },
        "master": { pass: "admin99", rol: "super", status: "activo" }
    };
    let currentUser = null, db = [], modoActual = 'Marítimo', streamCamera = null;
    let appLogo = localStorage.getItem('srca_logo') || '', currentPDFItem = null;
    let memoriaClientes = JSON.parse(localStorage.getItem('sccam_clientes')) || {};

    document.addEventListener('DOMContentLoaded', () => {
        verificarSesion();
        if(appLogo) document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`;
    });

    // --- AUTENTICACIÓN ---
    function manejarAuth() {
        const u = document.getElementById('user-input').value.trim().toLowerCase();
        const p = document.getElementById('pass-input').value;
        if (usuarios[u] && usuarios[u].pass === p) {
            if (usuarios[u].status === "suspendido") return alert("Cuenta restringida.");
            iniciarApp(u);
        } else { alert("Error de acceso."); }
    }

    function registrarUsuario() {
        const u = document.getElementById('reg-user').value.toLowerCase().trim(), p = document.getElementById('reg-pass').value, m = document.getElementById('reg-master').value;
        if(m !== AUTH_MASTER_CODE) return alert("Código maestro inválido.");
        usuarios[u] = { pass: p, rol: "operador", status: "activo" };
        localStorage.setItem('sicam_db_users', JSON.stringify(usuarios));
        alert("Creado."); toggleAuthMode(false);
    }

    function iniciarApp(userKey) {
        currentUser = usuarios[userKey]; localStorage.setItem('sicam_active_session', userKey);
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('welcome-user').innerText = `USUARIO: ${userKey.toUpperCase()}`;
        if(currentUser.rol === "super") {
            document.getElementById('admin-toggle-btn').style.display = 'block';
            actualizarListaUsuariosAdmin();
        }
        cargarDatosDeNube(); actualizarDatalistClientes();
    }

    function toggleAuthMode(isReg) {
        document.getElementById('login-fields').classList.toggle('hidden', isReg);
        document.getElementById('register-fields').classList.toggle('hidden', !isReg);
    }

    function cerrarSesion() { stopCamera(); localStorage.removeItem('sicam_active_session'); location.reload(); }

    // --- PANEL ADMIN ---
    function togglePanelAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function actualizarListaUsuariosAdmin() {
        const c = document.getElementById('user-list-admin'); c.innerHTML = '';
        Object.keys(usuarios).forEach(u => {
            const card = document.createElement('div'); card.className = 'user-row';
            card.innerHTML = `<div class="user-info"><b>${u}</b> | Clave: ${usuarios[u].pass} | Status: ${usuarios[u].status}</div>
                <button class="btn-panel" style="background:var(--warning)" onclick="statusUsuario('${u}')">Restringir/Activar</button>
                <button class="btn-panel" style="background:var(--danger)" onclick="eliminarUsuario('${u}')">Borrar</button>`;
            c.appendChild(card);
        });
    }

    function statusUsuario(u) { usuarios[u].status = usuarios[u].status === "activo" ? "suspendido" : "activo"; localStorage.setItem('sicam_db_users', JSON.stringify(usuarios)); actualizarListaUsuariosAdmin(); }
    function eliminarUsuario(u) { if(u!=='master'){delete usuarios[u]; localStorage.setItem('sicam_db_users', JSON.stringify(usuarios)); actualizarListaUsuariosAdmin();} }

    function verificarSesion() {
        const s = localStorage.getItem('sicam_active_session');
        if(s && usuarios[s] && usuarios[s].status === "activo") iniciarApp(s);
    }

    // --- CÁMARA (OPTIMIZADA) ---
    function mostrarSeccionCamara() { document.getElementById('seccionCamara').classList.remove('hidden'); }
    async function initCamera() {
        try {
            stopCamera();
            streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const v = document.getElementById('video'); v.srcObject = streamCamera;
            v.classList.remove('hidden'); document.getElementById('snap').classList.remove('hidden'); document.getElementById('initCamBtn').classList.add('hidden');
        } catch (e) { alert("Error cámara."); }
    }
    function stopCamera() {
        if(streamCamera) { streamCamera.getTracks().forEach(t => t.stop()); streamCamera = null; }
        const v = document.getElementById('video'); if(v){ v.srcObject = null; v.classList.add('hidden'); }
    }
    function takePhoto() {
        const c = document.getElementById('canvas'), v = document.getElementById('video'), p = document.getElementById('photoPreview');
        c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0);
        p.src = c.toDataURL('image/jpeg', 0.6); p.classList.remove('hidden');
        stopCamera(); document.getElementById('snap').classList.add('hidden'); document.getElementById('initCamBtn').classList.remove('hidden');
    }

    // --- NUBE Y FORMULARIO ---
    async function cargarDatosDeNube() {
        const { data, error } = await _supabase.from('registros_carga').select('*').order('created_at', { ascending: false });
        if (!error) { db = data; actualizarUI(); }
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('cuerpoTabla'), f = document.getElementById('buscador').value.toLowerCase();
        const filt = db.filter(i => i.tipo === modoActual);
        document.getElementById('cTotal').innerText = filt.length;
        let h = '';
        filt.forEach(i => {
            if(`${i.id_carga} ${i.cliente}`.toLowerCase().includes(f)) {
                h += `<tr><td><button onclick='generarPDF(${JSON.stringify(i)})'>PDF</button></td><td>${i.id_carga}</td><td>${i.fecha}</td><td>${i.num_precinto}</td><td>${i.cant_bultos}</td><td>${i.encargado}</td><td>${i.cliente}</td><td>${i.cedula}</td><td>${i.empresa}</td><td>${i.estado}</td><td>${i.foto ? `<img src="${i.foto}" class="img-table">` : 'N/A'}</td></tr>`;
            }
        });
        cuerpo.innerHTML = h;
    }

    async function registrarEnLaNube() {
        const id = document.getElementById('idPrincipal').value, cl = document.getElementById('cliente').value;
        if(!id || !cl) return alert("Falta ID o Cliente");
        const item = { id_carga: id, tipo: modoActual, fecha: document.getElementById('fechaHora').value, num_precinto: document.getElementById('numPrecinto').value, cant_bultos: document.getElementById('cantBultos').value, encargado: document.getElementById('encargado').value, almacenista: document.getElementById('almacenista').value, cliente: cl, empresa: document.getElementById('empresaCliente').value, cedula: document.getElementById('cedulaCliente').value, contenido: document.getElementById('contenido').value, no_declared: document.getElementById('noDeclarada').value, estado: document.getElementById('estado').value, observaciones: document.getElementById('obs').value, foto: document.getElementById('photoPreview').src.startsWith('data:image') ? document.getElementById('photoPreview').src : '' };
        await _supabase.from('registros_carga').insert([item]);
        alert("Guardado."); cargarDatosDeNube(); limpiarForm();
    }

    function cambiarModo(m) { modoActual = m; document.getElementById('tabM').classList.toggle('active', m === 'Marítimo'); document.getElementById('tabA').classList.toggle('active', m === 'Aéreo'); document.getElementById('txtModo').innerText = m.toUpperCase(); actualizarUI(); }
    function autocompletarCliente(v) { if(memoriaClientes[v]) { document.getElementById('cedulaCliente').value = memoriaClientes[v].cedula; document.getElementById('empresaCliente').value = memoriaClientes[v].empresa; } }
    function actualizarDatalistClientes() { const l = document.getElementById('clientesList'); l.innerHTML = ''; Object.keys(memoriaClientes).forEach(c => { const o = document.createElement('option'); o.value = c; l.appendChild(o); }); }
    function loadLogo(e) { const r = new FileReader(); r.onload = (ev) => { appLogo = ev.target.result; localStorage.setItem('srca_logo', appLogo); document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`; }; r.readAsDataURL(e.target.files[0]); }
    function limpiarForm() { document.querySelectorAll('input, textarea').forEach(i => { if(i.id!=="buscador")i.value=''; }); stopCamera(); document.getElementById('photoPreview').classList.add('hidden'); }

    function generarPDF(item) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        if(appLogo) doc.addImage(appLogo, 'PNG', 15, 10, 25, 25);
        doc.text("ACTA DE RECONOCIMIENTO", 50, 20);
        doc.text(`ID: ${item.id_carga}`, 15, 45); doc.text(`Cliente: ${item.cliente}`, 15, 55);
        if(item.foto) doc.addImage(item.foto, 'JPEG', 60, 70, 90, 60);
        doc.save(`ACTA_${item.id_carga}.pdf`);
    }
</script>
</body>
</html>
