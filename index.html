<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.C.C.A.M. - Control de Carga Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --text: #f1f5f9;
            --danger: #ef4444; --warning: #facc15; --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .logo-container { text-align: center; margin-bottom: 10px; cursor: pointer; }
        .logo-placeholder { width: 90px; height: 90px; border: 2px dashed var(--accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; overflow: hidden; background: #1e293b; }
        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .header-app { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .header-app h1 { font-size: 1rem; color: var(--accent); margin: 0; text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: 800; }
        
        .tabs { display: flex; gap: 5px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; color: #94a3b8; background: #1e293b; font-size: 0.75rem; }
        .tab.active { background: white; color: #0f172a; }

        .main-card { background: white; color: #1e293b; padding: 18px; border-radius: 0 10px 10px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 650px) { .form-grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }

        label { display: block; font-weight: 700; font-size: 0.65rem; margin-bottom: 4px; color: #475569; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; }
        
        .camera-section { background: #f1f5f9; padding: 10px; border-radius: 10px; border: 2px dashed #cbd5e1; text-align: center; }
        #video, #photoPreview { width: 100%; border-radius: 10px; margin-top: 5px; }

        .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-save { background: #0f172a; color: white; }
        .btn-download { background: var(--success); color: white; display: none; margin-top: 5px; }

        .search-box { margin-bottom: 15px; background: #1e293b; padding: 10px; border-radius: 10px; }
        .search-box input { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; width: 100%; border-radius: 8px; }

        .history-section { margin-top: 25px; background: var(--card); border-radius: 10px; padding: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        th { text-align: left; padding: 10px; color: #94a3b8; font-size: 0.65rem; border-bottom: 1px solid #334155; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #334155; font-size: 0.75rem; }
        .img-table { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }

        .action-btn { border: none; padding: 8px; border-radius: 5px; cursor: pointer; color: white; margin-right: 3px; font-size: 0.8rem; }
        .btn-edit { background: var(--warning); color: #000; }
        .btn-del { background: var(--danger); }
        .btn-pdf { background: #3b82f6; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" onclick="document.getElementById('logoInput').click()">
        <div class="logo-placeholder" id="logoDisplay"><span>LOGOTIPO</span></div>
        <input type="file" id="logoInput" hidden accept="image/*" onchange="loadLogo(event)">
    </div>

    <div class="header-app">
        <h1>SISTEMA DE CONTROL DE CARGA AÉREA Y MARÍTIMA</h1>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h4>REGISTROS</h4><p id="cTotal" style="color:var(--accent)">0</p></div>
        <div id="incidenciaCard" class="stat-card"><h4>INCIDENCIAS</h4><p id="cInc" style="color:var(--danger)">0</p></div>
    </div>

    <div class="tabs">
        <button id="tabM" class="tab active" onclick="cambiarModo('Marítimo')">🚢 MARÍTIMO</button>
        <button id="tabA" class="tab" onclick="cambiarModo('Aéreo')">✈️ AÉREO</button>
    </div>

    <div class="main-card">
        <div class="form-grid">
            <input type="hidden" id="editIndex" value="-1">
            
            <div><label id="labelId">N° Contenedor / Guía</label><input type="text" id="idPrincipal"></div>
            <div><label>Fecha y Hora</label><input type="datetime-local" id="fechaHora"></div>
            <div><label id="labelBultos">Seguridad (Precinto/Bultos)</label><input type="text" id="bultos"></div>
            <div><label>Inspector Actuante</label><input type="text" id="encargado"></div>
            <div><label>Encargado Almacén</label><input type="text" id="almacenista"></div>
            <div><label style="color:#d97706">Funcionario SENIAT</label><input type="text" id="seniat" style="background:#fffbeb"></div>
            
            <div><label>Nombre del Cliente</label><input type="text" id="cliente"></div>
            <div><label>Cédula / RIF Cliente</label><input type="text" id="cedulaCliente"></div>
            <div class="full"><label>Empresa del Cliente</label><input type="text" id="empresaCliente"></div>

            <div class="full"><label>Contenido Declarado</label><input type="text" id="contenido"></div>
            <div class="full"><label style="color:#be123c">⚠️ Carga NO Declarada (Hallazgos)</label><textarea id="noDeclarada" rows="2" style="background:#fff1f2"></textarea></div>
            
            <div>
                <label>Condición Física</label>
                <select id="estado">
                    <option value="Excelente">Excelente ✅</option>
                    <option value="Bueno">Bueno</option>
                    <option value="Dañado">Dañado ⚠️</option>
                    <option value="Mojado">Mojado 💧</option>
                    <option value="Sello Violado">Sello Violado 🚫</option>
                </select>
            </div>
            <div class="camera-section full">
                <button class="btn" style="background:#a855f7; color:white; padding:10px;" onclick="initCamera()">📸 CÁMARA</button>
                <video id="video" autoplay playsinline style="display:none"></video>
                <button id="snap" class="btn" style="display:none; background:var(--danger); color:white; margin-top:5px" onclick="takePhoto()">CAPTURAR EVIDENCIA</button>
                <img id="photoPreview" style="display:none">
                <canvas id="canvas" style="display:none"></canvas>
            </div>
            <div class="full"><label>Observaciones Finales</label><textarea id="obs" rows="2"></textarea></div>
        </div>
        <div class="actions">
            <button id="btnGuardar" class="btn btn-save" onclick="registrar()">REGISTRAR Y PROCESAR</button>
            <button id="btnDescargar" class="btn btn-download" onclick="descargarActaManual()">⬇️ DESCARGAR ACTA EN DISPOSITIVO</button>
            <button class="btn" style="background:#10b981; color:white" onclick="exportarExcel()">REPORTE EXCEL GENERAL</button>
        </div>
    </div>

    <div class="history-section">
        <div class="search-box"><input type="text" id="buscador" onkeyup="actualizarUI()" placeholder="🔍 Buscar por ID, Cliente o Empresa..."></div>
        <table id="tablaDatos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estado</th>
                    <th>Cliente / Empresa</th>
                    <th>Foto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sccam_final_v15')) || [];
    let appLogo = localStorage.getItem('srca_logo') || '';
    let currentPDFItem = null;
    let modoActual = 'Marítimo';
    let stream;

    if(appLogo) document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`;
    function loadLogo(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { appLogo = ev.target.result; localStorage.setItem('srca_logo', appLogo); document.getElementById('logoDisplay').innerHTML = `<img src="${appLogo}">`; };
        reader.readAsDataURL(e.target.files[0]);
    }
    async function initCamera() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
        document.getElementById('video').style.display = 'block'; document.getElementById('snap').style.display = 'block';
    }
    function takePhoto() {
        const c = document.getElementById('canvas'); const v = document.getElementById('video');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const data = c.toDataURL('image/jpeg', 0.6);
        document.getElementById('photoPreview').src = data; document.getElementById('photoPreview').style.display = 'block';
        if(stream) stream.getTracks().forEach(t => t.stop());
        v.style.display = 'none'; document.getElementById('snap').style.display = 'none';
    }

    function cambiarModo(m) {
        modoActual = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(m === 'Marítimo' ? 'tabM' : 'tabA').classList.add('active');
        document.getElementById('labelId').innerText = m === 'Marítimo' ? "N° Contenedor" : "N° Guía";
        actualizarUI();
    }

    function registrar() {
        const editIndex = parseInt(document.getElementById('editIndex').value);
        const item = {
            id: document.getElementById('idPrincipal').value,
            tipo: modoActual,
            fecha: document.getElementById('fechaHora').value.replace('T', ' '),
            bultos: document.getElementById('bultos').value,
            encargado: document.getElementById('encargado').value,
            almacenista: document.getElementById('almacenista').value,
            seniat: document.getElementById('seniat').value,
            cliente: document.getElementById('cliente').value,
            cedula: document.getElementById('cedulaCliente').value,
            empresa: document.getElementById('empresaCliente').value,
            contenido: document.getElementById('contenido').value,
            noDeclarado: document.getElementById('noDeclarada').value,
            estado: document.getElementById('estado').value,
            obs: document.getElementById('obs').value,
            foto: document.getElementById('photoPreview').src
        };
        if(!item.id || !item.cliente) return alert("Complete los campos obligatorios.");
        
        if(editIndex === -1) { db.push(item); } else { db[editIndex] = item; document.getElementById('editIndex').value = "-1"; document.getElementById('btnGuardar').innerText = "REGISTRAR Y PROCESAR"; document.getElementById('btnGuardar').style.background = "#0f172a"; }
        
        localStorage.setItem('sccam_final_v15', JSON.stringify(db));
        currentPDFItem = item;
        document.getElementById('btnDescargar').style.display = 'block';
        actualizarUI();
        alert("¡Registro guardado!");
    }

    function descargarActaManual() {
        if(currentPDFItem) { generarPDF(currentPDFItem); document.getElementById('btnDescargar').style.display = 'none'; limpiarForm(); }
    }

    function generarPDF(item) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        if(appLogo) doc.addImage(appLogo, 'PNG', 15, 10, 25, 25);
        doc.setFontSize(16); doc.text("ACTA DE RECONOCIMIENTO FÍSICO", 50, 20);
        doc.setFontSize(9); doc.text(`Modalidad: ${item.tipo} | Fecha: ${item.fecha}`, 50, 26);
        doc.line(15, 40, 195, 40);
        doc.setFont(undefined, 'bold'); doc.text("DATOS DEL CLIENTE", 15, 48); doc.setFont(undefined, 'normal');
        doc.text(`Cliente: ${item.cliente} | ID: ${item.cedula}`, 15, 55);
        doc.text(`Empresa: ${item.empresa}`, 15, 62);
        doc.line(15, 66, 195, 66);
        doc.text(`Identificador Carga: ${item.id}`, 15, 74);
        doc.text(`Estado: ${item.estado} | Contenido: ${item.contenido}`, 15, 81);
        if(item.noDeclarado) { doc.setTextColor(200,0,0); doc.text(` HALLAZGO: ${item.noDeclarado}`, 15, 89); doc.setTextColor(0); }
        if(item.foto) doc.addImage(item.foto, 'JPEG', 15, 95, 70, 50);
        doc.text("________________", 20, 240); doc.text("INSPECTOR", 25, 245);
        doc.text("________________", 80, 240); doc.text("SENIAT", 85, 245);
        doc.text("________________", 140, 240); doc.text("ALMACÉN", 145, 245);
        doc.save(`Acta_${item.id}.pdf`);
    }

    function actualizarUI() {
        const cuerpo = document.getElementById('cuerpoTabla');
        const filtro = document.getElementById('buscador').value.toLowerCase();
        cuerpo.innerHTML = '';
        db.slice().reverse().forEach((item) => {
            const index = db.indexOf(item);
            const rowText = `${item.id} ${item.cliente} ${item.empresa}`.toLowerCase();
            if(rowText.includes(filtro)) {
                cuerpo.innerHTML += `<tr>
                    <td><b>${item.id}</b></td>
                    <td>${item.estado}</td>
                    <td>${item.cliente}<br><small>${item.empresa}</small></td>
                    <td><img src="${item.foto || ''}" class="img-table"></td>
                    <td>
                        <button class="action-btn btn-pdf" onclick="generarPDF(db[${index}])">📄</button>
                        <button class="action-btn btn-edit" onclick="editar(${index})">✏️</button>
                        <button class="action-btn btn-del" onclick="eliminar(${index})">🗑️</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById('cTotal').innerText = db.length;
        document.getElementById('cInc').innerText = db.filter(i => i.estado !== 'Excelente' && i.estado !== 'Bueno').length;
    }

    function editar(idx) {
        const item = db[idx]; document.getElementById('editIndex').value = idx; cambiarModo(item.tipo);
        document.getElementById('idPrincipal').value = item.id; document.getElementById('fechaHora').value = item.fecha.replace(' ', 'T'); document.getElementById('bultos').value = item.bultos;
        document.getElementById('encargado').value = item.encargado; document.getElementById('almacenista').value = item.almacenista; document.getElementById('seniat').value = item.seniat;
        document.getElementById('cliente').value = item.cliente; document.getElementById('cedulaCliente').value = item.cedula; document.getElementById('empresaCliente').value = item.empresa;
        document.getElementById('contenido').value = item.contenido; document.getElementById('noDeclarada').value = item.noDeclarado; document.getElementById('estado').value = item.estado; document.getElementById('obs').value = item.obs;
        if(item.foto) { document.getElementById('photoPreview').src = item.foto; document.getElementById('photoPreview').style.display = 'block'; }
        document.getElementById('btnGuardar').innerText = "ACTUALIZAR REGISTRO"; document.getElementById('btnGuardar').style.background = "var(--warning)"; window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function eliminar(idx) { if(confirm("¿Eliminar?")) { db.splice(idx, 1); localStorage.setItem('sccam_final_v15', JSON.stringify(db)); actualizarUI(); } }
    function limpiarForm() { ['idPrincipal', 'fechaHora', 'bultos', 'encargado', 'almacenista', 'seniat', 'cliente', 'cedulaCliente', 'empresaCliente', 'contenido', 'noDeclarada', 'obs'].forEach(id => document.getElementById(id).value = ''); document.getElementById('photoPreview').style.display = 'none'; }
    function exportarExcel() {
        const clean = db.map(({foto, ...r}) => r);
        const ws = XLSX.utils.json_to_sheet(clean);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventario");
        XLSX.writeFile(wb, "Reporte_Logistica.xlsx");
    }
    actualizarUI();
</script>
</body>
</html>
